<title>삼다컨테스트 매장별 실적 대시보드</title>
<style>
  *, *::before, *::after { box-sizing: border-box !important; margin: 0; padding: 0; }
  :root {
    --primary: #003087;
    --accent: #e8001d;
    --bg: #f0f4fa;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --sub: #5a6a8a;
    --border: #d0daea;
    --shadow: 0 4px 18px rgba(0,48,135,0.10);
    --radius: 14px;
    /* 대리점 색상 */
    --c-js: #1565C0;
    --c-seoguipo: #00897B;
    --c-smile: #F57C00;
    --c-anyu: #8E24AA;
    --c-oreum: #D32F2F;
    --c-jeju: #0288D1;
    --c-jejuet: #558B2F;
    --c-jejugwangyang: #6D4C41;
    --c-jejugoodmorning: #E64A19;
    --c-jejujungdawoon: #00695C;
    --c-jejujungang: #283593;
  }
  html, body { height: 100%; background: var(--bg); font-family: 'Segoe UI', 'Noto Sans KR', sans-serif; color: var(--text); }
  body { min-width: 320px; }

  /* 보안 */
  ::selection { background: transparent; }

  /* 헤더 */
  #header {
    background: linear-gradient(135deg, #003087 0%, #0055cc 100%);
    color: #fff;
    text-align: center;
    padding: 28px 20px 18px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,48,135,0.25);
  }
  #header h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -1px; text-shadow: 0 2px 8px rgba(0,0,0,0.18); }
  #header .date-label { font-size: 0.75rem; font-weight: 700; margin-top: 6px; color: #a8c8ff; letter-spacing: 1px; }

  /* 대리점 1위 카드 섹션 */
  #top-cards-section { padding: 22px 18px 10px; }
  #top-cards-section h2 { font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-bottom: 14px; letter-spacing: -0.5px; }
  #top-cards { display: flex; flex-wrap: wrap; gap: 14px; }
  .top-card {
    flex: 1 1 180px; min-width: 160px; max-width: 240px;
    border-radius: var(--radius); padding: 16px 18px 14px;
    color: #fff; box-shadow: var(--shadow);
    position: relative; overflow: hidden;
    transition: transform 0.18s, box-shadow 0.18s;
    cursor: default;
  }
  .top-card:hover { transform: translateY(-4px) scale(1.03); box-shadow: 0 8px 28px rgba(0,0,0,0.18); }
  .top-card .agency-name { font-size: 1.15rem; font-weight: 800; display: flex; align-items: center; gap: 6px; }
  .top-card .store-name { font-size: 0.82rem; font-weight: 500; margin-top: 4px; opacity: 0.88; }
  .top-card .score { font-size: 1.25rem; font-weight: 400; margin-top: 8px; }
  .top-card .crown { font-size: 1.4rem; }
  .top-card::after { content: ''; position: absolute; right: -18px; bottom: -18px; width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.10); }

  /* 탭 */
  #tab-bar {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 14px 18px 0;
    position: sticky; top: 90px; z-index: 90;
    background: var(--bg);
    border-bottom: 2px solid var(--border);
    padding-bottom: 0;
  }
  .tab-btn {
    padding: 8px 16px; border-radius: 8px 8px 0 0;
    border: 1.5px solid var(--border); border-bottom: none;
    background: #e8eef8; color: var(--sub);
    font-size: 0.82rem; font-weight: 700; cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .tab-btn:hover:not(.active) { background: #c8d8f0; color: var(--primary); }

  /* 탭 콘텐츠 */
  #tab-content { padding: 18px; overflow-x: auto; overflow-y: auto; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* 테이블 공통 */
  .data-table-wrap { overflow-x: auto; overflow-y: auto; border-radius: var(--radius); box-shadow: var(--shadow); background: var(--card-bg); }
  table { width: 100%; border-collapse: collapse; min-width: 900px; font-size: 0.82rem; }
  thead tr { background: var(--primary); color: #fff; }
  thead th { padding: 10px 10px; font-weight: 700; text-align: center; white-space: nowrap; border-right: 1px solid rgba(255,255,255,0.15); position: sticky; top: 0; z-index: 5; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
  tbody tr:hover { background: #e8f0fe !important; }
  tbody tr:nth-child(even) { background: #f7faff; }
  tbody td { padding: 8px 10px; text-align: center; white-space: nowrap; border-right: 1px solid var(--border); cursor: default; }
  tbody td:first-child { text-align: left; font-weight: 600; }
  .rank-badge {
    display: inline-block; width: 26px; height: 26px; line-height: 26px;
    border-radius: 50%; font-weight: 800; font-size: 0.8rem; text-align: center;
  }
  .rank-1 { background: #FFD700; color: #7a5800; }
  .rank-2 { background: #C0C0C0; color: #444; }
  .rank-3 { background: #CD7F32; color: #fff; }
  .rank-other { background: #e0e8f8; color: var(--primary); }

  /* 점수합 강조 */
  .score-high { color: #003087; font-weight: 800; }

  /* AI 코멘트 버튼 */
  .ai-btn {
    padding: 4px 10px; border-radius: 20px;
    background: linear-gradient(90deg, #003087, #0055cc);
    color: #fff; font-size: 0.72rem; font-weight: 700;
    border: none; cursor: pointer; white-space: nowrap;
    transition: opacity 0.15s, transform 0.12s;
  }
  .ai-btn:hover { opacity: 0.85; transform: scale(1.05); }

  /* AI 코멘트 모달 */
  #ai-modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 999;
    align-items: center; justify-content: center;
  }
  #ai-modal-overlay.show { display: flex; }
  #ai-modal {
    background: #fff; border-radius: 18px; padding: 28px 28px 22px;
    max-width: 520px; width: 92%; box-shadow: 0 8px 40px rgba(0,48,135,0.22);
    position: relative; max-height: 80vh; overflow-y: auto;
  }
  #ai-modal h3 { font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-bottom: 14px; }
  #ai-modal .ai-content { font-size: 0.88rem; line-height: 1.7; color: var(--text); }
  #ai-modal .ai-content .ai-item { margin-bottom: 10px; padding: 10px 14px; border-radius: 10px; background: #f0f4fa; border-left: 4px solid var(--primary); }
  #ai-modal .close-btn {
    position: absolute; top: 14px; right: 18px;
    background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--sub);
  }
  #ai-modal .close-btn:hover { color: var(--accent); }

  /* 툴팁 */
  [data-tooltip] { position: relative; }
  [data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
    background: #1a1a2e; color: #fff; padding: 5px 10px; border-radius: 7px;
    font-size: 0.72rem; white-space: nowrap; z-index: 200;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    pointer-events: none;
  }
  [data-tooltip]:hover::before {
    content: '';
    position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    border: 5px solid transparent; border-top-color: #1a1a2e; z-index: 200;
    pointer-events: none;
  }

  /* 반응형 */
  @media (max-width: 700px) {
    #header h1 { font-size: 1.5rem; }
    .top-card { min-width: 140px; }
    #tab-bar { top: 72px; }
    table { font-size: 0.72rem; }
    thead th, tbody td { padding: 6px 6px; }
  }

  /* 대리점 행 색상 */
  .agency-js td:first-child { border-left: 4px solid var(--c-js); }
  .agency-seoguipo td:first-child { border-left: 4px solid var(--c-seoguipo); }
  .agency-smile td:first-child { border-left: 4px solid var(--c-smile); }
  .agency-anyu td:first-child { border-left: 4px solid var(--c-anyu); }
  .agency-oreum td:first-child { border-left: 4px solid var(--c-oreum); }
  .agency-jeju td:first-child { border-left: 4px solid var(--c-jeju); }
  .agency-jejuet td:first-child { border-left: 4px solid var(--c-jejuet); }
  .agency-jejugwangyang td:first-child { border-left: 4px solid var(--c-jejugwangyang); }
  .agency-jejugoodmorning td:first-child { border-left: 4px solid var(--c-jejugoodmorning); }
  .agency-jejujungdawoon td:first-child { border-left: 4px solid var(--c-jejujungdawoon); }
  .agency-jejujungang td:first-child { border-left: 4px solid var(--c-jejujungang); }

  .no-data { text-align: center; color: var(--sub); padding: 30px; font-size: 0.95rem; }

  /* 전월대비 색상 */
  .trend-up { color: #1565C0; font-weight: 600; }
  .trend-none { color: #aaa; }
  .trend-new { color: #E64A19; font-weight: 600; font-size: 0.7rem; }
</style>
</head>

        (e.ctrlKey && e.keyCode === 85) ||

  "스마일":    { color: "#F57C00", cls: "agency-smile",           bg: "linear-gradient(135deg,#F57C00,#FB8C00)" },
  "앤유":      { color: "#8E24AA", cls: "agency-anyu",            bg: "linear-gradient(135deg,#8E24AA,#AB47BC)" },
  "오름":      { color: "#D32F2F", cls: "agency-oreum",           bg: "linear-gradient(135deg,#D32F2F,#E53935)" },
  "제주":      { color: "#0288D1", cls: "agency-jeju",            bg: "linear-gradient(135deg,#0288D1,#039BE5)" },
  "제주E&T":   { color: "#558B2F", cls: "agency-jejuet",          bg: "linear-gradient(135deg,#558B2F,#689F38)" },
  "제주광양":  { color: "#6D4C41", cls: "agency-jejugwangyang",   bg: "linear-gradient(135deg,#6D4C41,#8D6E63)" },
  "제주굿모닝":{ color: "#E64A19", cls: "agency-jejugoodmorning", bg: "linear-gradient(135deg,#E64A19,#F4511E)" },

};

const AGENCY_ORDER = ["JS","서귀포","스마일","앤유","오름","제주","제주E&T","제주광양","제주굿모닝","제주정다운","제주중앙"];

// ===================== 유틸 =====================
function getRankBadge(r) {
  if(r===1) return `<span class="rank-badge rank-1">1</span>`;
  if(r===2) return `<span class="rank-badge rank-2">2</span>`;
  if(r===3) return `<span class="rank-badge rank-3">3</span>`;
  return `<span class="rank-badge rank-other">${r}</span>`;
}

function trendClass(t) {
  if(!t || t==="당월無") return "trend-none";
  if(t.includes("전월無당월有")) return "trend-new";
  return "trend-up";
}

function trendDisplay(t) {
  if(!t || t==="당월無") return '<span class="trend-none">당월無</span>';
  if(t.includes("전월無당월有")) return '<span class="trend-new">전월無<br>당월有</span>';
  return `<span class="trend-up">${t}</span>`;
}

// ===================== 대리점별 1위 카드 =====================
function buildTopCards() {
  const container = document.getElementById('top-cards');
  let html = '';
  AGENCY_ORDER.forEach(agency => {
    const stores = RAW_DATA.filter(d => d.agency === agency);
    if(!stores.length) return;
    const top = stores.reduce((a,b) => a.score > b.score ? a : b);
    const cfg = AGENCY_CONFIG[agency] || { bg: "linear-gradient(135deg,#333,#555)" };
    html += `
      <div class="top-card" style="background:${cfg.bg};"
           data-tooltip="점수합: ${top.score} | 매장실적소계: ${top.매장소계} | 팀활동: ${top.팀소계}">
        <div class="agency-name">${agency} <span class="crown">👑</span></div>
        <div class="store-name">${top.store}</div>
        <div class="score">점수합: <strong>${top.score}</strong>점</div>
      </div>`;
  });
  container.innerHTML = html;
}

// ===================== 탭 생성 =====================
function buildTabs() {
  const tabBar = document.getElementById('tab-bar');
  const tabContent = document.getElementById('tab-content');
  const tabs = ['종합현황', ...AGENCY_ORDER];
  let tabHtml = '';
  let contentHtml = '';

  tabs.forEach((tab, i) => {
    tabHtml += `<button class="tab-btn${i===0?' active':''}" onclick="switchTab('${tab}',this)">${tab}</button>`;
    if(tab === '종합현황') {
      contentHtml += `<div class="tab-panel${i===0?' active':''}" id="panel-종합현황">${buildOverallTable()}</div>`;
    } else {
      contentHtml += `<div class="tab-panel" id="panel-${tab}">${buildAgencyTable(tab)}</div>`;
    }
  });

  tabBar.innerHTML = tabHtml;
  tabContent.innerHTML = contentHtml;
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const panel = document.getElementById('panel-' + name);
  if(panel) panel.classList.add('active');
}

// ===================== 종합현황 테이블 =====================
function buildOverallTable() {
  const sorted = [...RAW_DATA].sort((a,b) => a.rank - b.rank || b.score - a.score);
  const cfg_map = AGENCY_CONFIG;

  let rows = '';
  sorted.forEach(d => {
    const cfg = cfg_map[d.agency] || {};
    rows += `
      <tr class="${cfg.cls||''}">
        <td data-tooltip="대리점: ${d.agency}" style="border-left:4px solid ${cfg.color||'#ccc'};font-weight:700;color:${cfg.color||'#333'}">${d.agency}</td>
        <td data-tooltip="당월 순위: ${d.rank}위">${getRankBadge(d.rank)}</td>
        <td data-tooltip="점수합: ${d.score}" class="score-high">${d.score}</td>
        <td data-tooltip="타사단골모집 실적: ${d.단골실적}건 | 전월대비: ${d.trend_단골}">${d.단골실적}</td>
        <td data-tooltip="010 실적: ${d.실적010}건 | 전월대비: ${d.trend_010}">${d.실적010}</td>
        <td data-tooltip="MNP 실적: ${d.MNP실적}건 | 전월대비: ${d.trend_MNP}">${d.MNP실적}</td>
        <td data-tooltip="MVNO 실적: ${d.MVNO실적}건 | 전월대비: ${d.trend_MVNO}">${d.MVNO실적}</td>
        <td data-tooltip="초고속 실적: ${d.초고속실적}건 | 전월대비: ${d.trend_초고속}">${d.초고속실적}</td>
        <td data-tooltip="IPTV 실적: ${d.IPTV실적}건 | 전월대비: ${d.trend_IPTV}">${d.IPTV실적}</td>
        <td data-tooltip="당월 매장실적 소계: ${d.매장소계}점">${d.매장소계}</td>
        <td data-tooltip="팀활동 20점: ${d.팀20}점">${d.팀20||0}</td>
        <td data-tooltip="팀활동 30점: ${d.팀30}점">${d.팀30||0}</td>
        <td data-tooltip="당월 팀활동 소계: ${d.팀소계}점">${d.팀소계||0}</td>
      </tr>`;
  });

  return `
    <div class="data-table-wrap">
      <table>
        <thead>
          <tr>
            <th>대리점</th><th>순위</th><th>점수합</th>
            <th>타사단골모집</th><th>010</th><th>MNP</th><th>MVNO</th><th>초고속</th><th>IPTV</th>
            <th>매장실적소계</th><th>팀활동20점</th><th>팀활동30점</th><th>팀활동소계</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ===================== 대리점별 테이블 =====================
function buildAgencyTable(agency) {
  const stores = RAW_DATA.filter(d => d.agency === agency)
                         .sort((a,b) => b.score - a.score);
  const cfg = AGENCY_CONFIG[agency] || {};
  const allSorted = [...RAW_DATA].sort((a,b) => b.score - a.score);
  const totalCount = allSorted.length;

  let rows = '';
  stores.forEach((d, idx) => {
    const isTop = idx === 0;
    const globalRank = allSorted.findIndex(x => x.store === d.store) + 1;

    rows += `
      <tr>
        <td data-tooltip="매장명: ${d.store} | 전체 ${globalRank}위" style="font-weight:700;color:${cfg.color||'#333'}">${d.store}</td>
        <td data-tooltip="점수합: ${d.score}" class="score-high">${d.score}</td>
        <td style="min-width:110px;">
          ${isTop
            ? `<span style="color:#FFD700;font-weight:800;font-size:0.85rem;">👑 1위 매장</span>`
            : `<button class="ai-btn" onclick="showAI('${d.store.replace(/'/g,"\\'")}')">🤖 AI 코멘트</button>`
          }
        </td>
        <td data-tooltip="타사단골모집 실적: ${d.단골실적}건 | 평가환산: ${d.단골점수}점 | 전월대비: ${d.trend_단골}">${d.단골실적}</td>
        <td data-tooltip="010 실적: ${d.실적010}건 | 평가환산: ${d.점수010}점 | 전월대비: ${d.trend_010}">${d.실적010}</td>
        <td data-tooltip="MNP 실적: ${d.MNP실적}건 | 평가환산: ${d.MNP점수}점 | 전월대비: ${d.trend_MNP}">${d.MNP실적}</td>
        <td data-tooltip="MVNO 실적: ${d.MVNO실적}건 | 평가환산: ${d.MVNO점수}점 | 전월대비: ${d.trend_MVNO}">${d.MVNO실적}</td>
        <td data-tooltip="초고속 실적: ${d.초고속실적}건 | 평가환산: ${d.초고속점수}점 | 전월대비: ${d.trend_초고속}">${d.초고속실적}</td>
        <td data-tooltip="IPTV 실적: ${d.IPTV실적}건 | 평가환산: ${d.IPTV점수}점 | 전월대비: ${d.trend_IPTV}">${d.IPTV실적}</td>
        <td data-tooltip="당월 매장실적 소계: ${d.매장소계}점">${d.매장소계}</td>
        <td data-tooltip="팀활동 20점: ${d.팀20}점">${d.팀20||0}</td>
        <td data-tooltip="팀활동 30점: ${d.팀30}점">${d.팀30||0}</td>
        <td data-tooltip="당월 팀활동 소계: ${d.팀소계}점">${d.팀소계||0}</td>
      </tr>`;
  });

  return `
    <div style="margin-bottom:10px;font-size:0.85rem;color:${cfg.color||'#333'};font-weight:700;">
      📍 ${agency} 대리점 — 소속 매장 ${stores.length}개
    </div>
    <div class="data-table-wrap">
      <table>
        <thead>
          <tr>
            <th>매장</th><th>점수합</th><th>AI 코멘트</th>
            <th>타사단골모집</th><th>010</th><th>MNP</th><th>MVNO</th><th>초고속</th><th>IPTV</th>
            <th>매장실적소계</th><th>팀활동20점</th><th>팀활동30점</th><th>팀활동소계</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ===================== AI 코멘트 =====================
function showAI(storeName) {
  const d = RAW_DATA.find(x => x.store === storeName);
  if(!d) return;

  const allSorted = [...RAW_DATA].sort((a,b) => b.score - a.score);
  const totalCount = allSorted.length;
  const myRank = allSorted.findIndex(x => x.store === storeName) + 1;

  // 상위 매장들과 비교
  const top5 = allSorted.slice(0, 5);
  const prevStore = myRank > 1 ? allSorted[myRank - 2] : null;
  const nextStore = myRank < totalCount ? allSorted[myRank] : null;

  // 각 항목별 최고값
  const maxScores = {
    단골: Math.max(...RAW_DATA.map(x=>x.단골점수)),
    '010': Math.max(...RAW_DATA.map(x=>x.점수010)),
    MNP: Math.max(...RAW_DATA.map(x=>x.MNP점수)),
    MVNO: Math.max(...RAW_DATA.map(x=>x.MVNO점수)),
    초고속: Math.max(...RAW_DATA.map(x=>x.초고속점수)),
    IPTV: Math.max(...RAW_DATA.map(x=>x.IPTV점수)),
  };

  // 약점 분석
  const weakItems = [];
  if(d.단골점수 < maxScores.단골 * 0.5) weakItems.push({name:'타사단골모집', cur:d.단골실적, curPt:d.단골점수, maxPt:maxScores.단골});
  if(d.점수010 < maxScores['010'] * 0.5) weakItems.push({name:'010', cur:d.실적010, curPt:d.점수010, maxPt:maxScores['010']});
  if(d.MNP점수 < maxScores.MNP * 0.5) weakItems.push({name:'MNP', cur:d.MNP실적, curPt:d.MNP점수, maxPt:maxScores.MNP});
  if(d.MVNO점수 < maxScores.MVNO * 0.5) weakItems.push({name:'MVNO', cur:d.MVNO실적, curPt:d.MVNO점수, maxPt:maxScores.MVNO});
  if(d.초고속점수 < maxScores.초고속 * 0.5) weakItems.push({name:'초고속', cur:d.초고속실적, curPt:d.초고속점수, maxPt:maxScores.초고속});
  if(d.IPTV점수 < maxScores.IPTV * 0.5) weakItems.push({name:'IPTV', cur:d.IPTV실적, curPt:d.IPTV점수, maxPt:maxScores.IPTV});

  // 팀활동 미달
  const teamMissing = (d.팀20 === 0 ? 20 : 0) + (d.팀30 === 0 ? 30 : 0);

  // 상위 진입 시뮬레이션
  const rank10Store = allSorted[9]; // 10위
  const rank20Store = allSorted[19]; // 20위
  const rank5Store = allSorted[4]; // 5위

  let targetInfo = '';
  if(myRank > 10) {
    const gap10 = (rank10Store.score - d.score).toFixed(1);
    targetInfo = `<div class="ai-item">📊 <strong>TOP 10 진입</strong>을 위해서는 현재 점수 <strong>${d.score}점</strong>에서 <strong>${gap10}점</strong> 추가가 필요합니다. (10위: ${rank10Store.store} ${rank10Store.score}점)</div>`;
  } else if(myRank > 5) {
    const gap5 = (rank5Store.score - d.score).toFixed(1);
    targetInfo = `<div class="ai-item">🎯 <strong>TOP 5 진입</strong>을 위해서는 <strong>${gap5}점</strong> 추가가 필요합니다. (5위: ${rank5Store.store} ${rank5Store.score}점)</div>`;
  } else if(myRank > 1) {
    const gap1 = (allSorted[0].score - d.score).toFixed(1);
    targetInfo = `<div class="ai-item">🏆 <strong>전체 1위</strong>를 위해서는 <strong>${gap1}점</strong> 추가가 필요합니다. (1위: ${allSorted[0].store} ${allSorted[0].score}점)</div>`;
  }

  let weakHtml = '';
  if(weakItems.length > 0) {
    weakHtml = weakItems.map(w => {
      const needed = Math.ceil((w.maxPt - w.curPt) / 2);
      return `<div class="ai-item">⚡ <strong>${w.name}</strong>: 현재 ${w.cur}건(${w.curPt}점) → 최고 ${w.maxPt}점 대비 부족. 약 <strong>${needed}점</strong> 향상 여지 있음</div>`;
    }).join('');
  }

  let teamHtml = '';
  if(teamMissing > 0) {
    teamHtml = `<div class="ai-item">🎪 <strong>팀활동 미참여</strong>: 팀활동 참여 시 최대 <strong>${teamMissing}점</strong> 추가 획득 가능 (S26 AI 컨테스트 20점 + 유심교체 VMD 30점)</div>`;
  }

  let prevHtml = '';
  if(prevStore) {
    const gap = (prevStore.score - d.score).toFixed(1);
    prevHtml = `<div class="ai-item">⬆️ 바로 위 <strong>${myRank-1}위 ${prevStore.store}</strong>(${prevStore.score}점)까지 <strong>${gap}점</strong> 차이입니다.</div>`;
  }

  const body = `
    <div class="ai-item" style="background:#fff3e0;border-left-color:#F57C00;">
      📍 <strong>${storeName}</strong> — 현재 전체 <strong>${myRank}위</strong> / ${totalCount}개 매장 (점수합: ${d.score}점)
    </div>
    ${targetInfo}
    ${prevHtml}
    ${weakHtml}
    ${teamHtml}
    <div class="ai-item" style="background:#e8f5e9;border-left-color:#388E3C;">
      💡 <strong>종합 제언</strong>: ${
        weakItems.length > 0
          ? `${weakItems.map(w=>w.name).join(', ')} 항목 집중 강화`
          : '전반적으로 균형 잡힌 실적'
      }${teamMissing > 0 ? ' + 팀활동 참여 필수' : ''}로 순위 상승이 가능합니다.
    </div>`;

  document.getElementById('ai-modal-title').textContent = `🤖 AI 실적 분석 — ${storeName}`;
  document.getElementById('ai-modal-body').innerHTML = body;
  document.getElementById('ai-modal-overlay').classList.add('show');
}

function closeAIModal() {
  document.getElementById('ai-modal-overlay').classList.remove('show');
}

document.getElementById('ai-modal-overlay').addEventListener('click', function(e) {
  if(e.target === this) closeAIModal();
});

// ===================== 초기화 =====================
buildTopCards();
buildTabs();
</script>
</body>
</html>
