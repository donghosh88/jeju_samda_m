<style>
  *, *::before, *::after { box-sizing: border-box !important; margin: 0; padding: 0; }

  :root {
    --primary: #1a3a6b;
    --primary-light: #2563eb;
    --bg: #f0f4fa;
    --card-bg: #ffffff;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --shadow: 0 4px 24px rgba(26,58,107,0.10);
    --radius: 14px;
    /* 대리점 색상 */
    --c-js: #2563eb;
    --c-seoguipo: #0891b2;
    --c-smile: #16a34a;
    --c-anyu: #7c3aed;
    --c-oreum: #ea580c;
    --c-jeju: #be185d;
    --c-jejuet: #0f766e;
    --c-jejugwangyang: #b45309;
    --c-jejugoodmorning: #4f46e5;
    --c-jejujungdawoon: #dc2626;
    --c-jejujungang: #0369a1;
  }

  html, body { height: 100%; font-family: 'Segoe UI', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  /* ── 보안 ── */
  body { user-select: none; -webkit-user-select: none; }

  /* ── 헤더 ── */
  #header {
    background: linear-gradient(135deg, #1a3a6b 0%, #2563eb 100%);
    color: #fff;
    text-align: center;
    padding: 28px 20px 18px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 16px rgba(26,58,107,0.18);
  }
  #header h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -1px; text-shadow: 0 2px 8px rgba(0,0,0,0.18); }
  #header .date-label { font-size: 0.75rem; font-weight: 700; margin-top: 6px; color: #bfdbfe; letter-spacing: 1px; }

  /* ── 탭 ── */
  #tab-bar {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 14px 20px 0;
    background: #fff;
    border-bottom: 2px solid var(--border);
    position: sticky; top: 96px; z-index: 90;
    overflow-x: auto;
  }
  .tab-btn {
    padding: 8px 16px; border: none; border-radius: 8px 8px 0 0;
    font-size: 0.82rem; font-weight: 700; cursor: pointer;
    background: #e2e8f0; color: #475569;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .tab-btn.active { background: var(--primary); color: #fff; }
  .tab-btn:hover:not(.active) { background: #cbd5e1; }

  /* ── 메인 콘텐츠 ── */
  #main { padding: 24px 20px; min-height: 60vh; overflow-x: auto; overflow-y: auto; }

  /* ── 대리점 1위 카드 ── */
  #top-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .top-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
    border-left: 6px solid #ccc;
    min-width: 180px;
    transition: transform 0.15s;
  }
  .top-card:hover { transform: translateY(-3px); }
  .top-card .agency-name { font-size: 1.1rem; font-weight: 900; display: flex; align-items: center; gap: 6px; }
  .top-card .store-name { font-size: 0.78rem; color: var(--text-muted); margin: 4px 0 8px; }
  .top-card .score { font-size: 1.25rem; font-weight: 500; }
  .top-card .rank-badge { display: inline-block; background: #fef3c7; color: #92400e; font-size: 0.7rem; font-weight: 700; border-radius: 20px; padding: 2px 10px; margin-top: 6px; }

  /* ── 테이블 공통 ── */
  .table-wrap { overflow-x: auto; overflow-y: auto; border-radius: var(--radius); box-shadow: var(--shadow); background: #fff; }
  table { width: 100%; border-collapse: collapse; min-width: 900px; }
  thead th {
    background: var(--primary);
    color: #fff;
    padding: 10px 10px;
    font-size: 0.78rem;
    font-weight: 700;
    text-align: center;
    white-space: nowrap;
    position: sticky; top: 0; z-index: 5;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
  tbody tr:hover { background: #eff6ff !important; }
  tbody td {
    padding: 8px 10px;
    font-size: 0.8rem;
    text-align: center;
    white-space: nowrap;
    cursor: default;
  }
  tbody tr:nth-child(even) { background: #f8fafc; }

  /* 순위 배지 */
  .rank-1 { background: #fef9c3; font-weight: 900; color: #92400e; }
  .rank-2 { background: #f1f5f9; font-weight: 700; }
  .rank-3 { background: #fff7ed; font-weight: 700; }

  /* 점수 강조 */
  .score-high { color: #16a34a; font-weight: 700; }
  .score-mid  { color: #2563eb; font-weight: 600; }
  .score-low  { color: #94a3b8; }

  /* 전월대비 */
  .up   { color: #16a34a; font-weight: 600; }
  .none { color: #94a3b8; font-size: 0.72rem; }
  .new  { color: #f59e0b; font-size: 0.72rem; font-weight: 700; }

  /* AI 코멘트 버튼 */
  .ai-btn {
    background: linear-gradient(90deg, #6366f1, #2563eb);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .ai-btn:hover { opacity: 0.85; }

  /* AI 모달 */
  #ai-modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 999;
    align-items: center; justify-content: center;
  }
  #ai-modal-overlay.show { display: flex; }
  #ai-modal {
    background: #fff;
    border-radius: 18px;
    padding: 32px 28px;
    max-width: 520px; width: 92%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.22);
    position: relative;
    max-height: 80vh; overflow-y: auto;
  }
  #ai-modal h3 { font-size: 1.1rem; font-weight: 900; color: var(--primary); margin-bottom: 14px; }
  #ai-modal p  { font-size: 0.88rem; line-height: 1.7; color: #334155; }
  #ai-modal .close-btn {
    position: absolute; top: 14px; right: 18px;
    background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #94a3b8;
  }
  #ai-modal .highlight { color: #2563eb; font-weight: 700; }
  #ai-modal ul { margin: 10px 0 0 16px; }
  #ai-modal li { font-size: 0.85rem; line-height: 1.8; color: #334155; }

  /* Tooltip */
  [data-tooltip] { position: relative; }
  [data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%; transform: translateX(-50%);
    background: #1e293b;
    color: #fff;
    font-size: 0.72rem;
    padding: 5px 10px;
    border-radius: 6px;
    white-space: nowrap;
    z-index: 200;
    pointer-events: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }

  /* 대리점 색상 테마 */
  .agency-JS           { border-left-color: var(--c-js) !important; }
  .agency-서귀포        { border-left-color: var(--c-seoguipo) !important; }
  .agency-스마일        { border-left-color: var(--c-smile) !important; }
  .agency-앤유          { border-left-color: var(--c-anyu) !important; }
  .agency-오름          { border-left-color: var(--c-oreum) !important; }
  .agency-제주          { border-left-color: var(--c-jeju) !important; }
  .agency-제주ET        { border-left-color: var(--c-jejuet) !important; }
  .agency-제주광양      { border-left-color: var(--c-jejugwangyang) !important; }
  .agency-제주굿모닝    { border-left-color: var(--c-jejugoodmorning) !important; }
  .agency-제주정다운    { border-left-color: var(--c-jejujungdawoon) !important; }
  .agency-제주중앙      { border-left-color: var(--c-jejujungang) !important; }

  .color-JS           { color: var(--c-js) !important; }
  .color-서귀포        { color: var(--c-seoguipo) !important; }
  .color-스마일        { color: var(--c-smile) !important; }

  .color-제주정다운    { color: var(--c-jejujungdawoon) !important; }
  .color-제주중앙      { color: var(--c-jejujungang) !important; }

  .bg-스마일        { background: #f0fdf4 !important; }

  /* 반응형 */
  @media (max-width: 768px) {
    #header h1 { font-size: 1.5rem; }
    #tab-bar { top: 72px; }
    #main { padding: 14px 6px; }
    .top-card .agency-name { font-size: 0.95rem; }
    .top-card .score { font-size: 1rem; }
    thead th { font-size: 0.68rem; padding: 7px 5px; }
    tbody td { font-size: 0.72rem; padding: 6px 5px; }
  }

  /* 섹션 제목 */
  .section-title {
    font-size: 1.05rem; font-weight: 800; color: var(--primary);
    margin: 0 0 14px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--primary-light);
    display: flex; align-items: center; gap: 8px;
  }

  /* 요약 통계 바 */
  .summary-bar {
    display: flex; flex-wrap: wrap; gap: 12px;
    margin-bottom: 20px;
  }
  .summary-chip {
    background: #fff;
    border-radius: 10px;
    padding: 10px 18px;
    box-shadow: 0 2px 8px rgba(26,58,107,0.08);
    font-size: 0.8rem;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    min-width: 100px;
  }
  .summary-chip .chip-val { font-size: 1.3rem; font-weight: 900; color: var(--primary); }
  .summary-chip .chip-lbl { color: var(--text-muted); font-size: 0.72rem; }
</style>
</head>

   cmp_단골:"전월無당월有",cmp_010:"전월無당월有",cmp_MNP:"당월無",cmp_MVNO:"전월無당월有",cmp_초고속:"전월無당월有",cmp_IPTV:"전월無당월有",
   단골실:0,단골점:0,실010:0,점010:0,MNP실:0,MNP점:0,MVNO실:0,MVNO점:0,초고속실:0,초고속점:0,IPTV실:0,IPTV점:0,
   매장소계:0,팀20:0,팀30:0,팀10:0,팀소계:0}
];

/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */
const AGENCY_CONFIG = {
  "JS":         { color: "#2563eb", bg: "#eff6ff",  emoji: "🔵" },
  "서귀포":     { color: "#0891b2", bg: "#ecfeff",  emoji: "🩵" },

  "제주":       { color: "#be185d", bg: "#fdf2f8",  emoji: "🩷" },
  "제주E&T":    { color: "#0f766e", bg: "#f0fdfa",  emoji: "🟤" },
  "제주광양":   { color: "#b45309", bg: "#fffbeb",  emoji: "🟡" },

};

const AGENCY_LIST = ["JS","서귀포","스마일","앤유","오름","제주","제주E&T","제주광양","제주굿모닝","제주정다운","제주중앙"];

/* ═══════════════════════════════════════════════
   유틸
═══════════════════════════════════════════════ */
function getAgencyKey(agency) {
  return agency.replace(/[&]/g,'ET').replace(/\s/g,'');
}

function cmpClass(val) {
  if (!val || val === '-') return '';
  if (val === '당월無') return 'none';
  if (val === '전월無당월有') return 'new';
  return 'up';
}

function cmpLabel(val) {
  if (!val || val === '-') return '-';
  if (val === '당월無') return '당월無';
  if (val === '전월無당월有') return '전월無→有';
  return val;
}

function scoreClass(v) {
  if (v >= 20) return 'score-high';
  if (v >= 8)  return 'score-mid';
  return 'score-low';
}

function rankEmoji(r) {
  if (r === 1) return '🥇';
  if (r === 2) return '🥈';
  if (r === 3) return '🥉';
  return '';
}

/* ═══════════════════════════════════════════════
   대리점별 1위 매장 계산
═══════════════════════════════════════════════ */
function getTopByAgency() {
  const map = {};
  RAW_DATA.forEach(d => {
    if (!map[d.agency] || d.score > map[d.agency].score) {
      map[d.agency] = d;
    }
  });
  return map;
}

/* ═══════════════════════════════════════════════
   AI 코멘트 생성
═══════════════════════════════════════════════ */
function generateAIComment(store) {
  const allSorted = [...RAW_DATA].sort((a,b) => b.score - a.score);
  const myIdx = allSorted.findIndex(d => d.store === store.store);
  const myRank = myIdx + 1;
  const totalStores = allSorted.length;

  if (myRank === 1) {
    return `<p>🏆 <span class="highlight">${store.store}</span>은(는) 현재 전체 ${totalStores}개 매장 중 <span class="highlight">1위</span>입니다! 최고의 실적을 유지하고 있습니다.</p>`;
  }

  const top1 = allSorted[0];
  const prevStore = myIdx > 0 ? allSorted[myIdx - 1] : null;
  const scoreDiff1 = (top1.score - store.score).toFixed(1);
  const scoreDiffPrev = prevStore ? (prevStore.score - store.score).toFixed(1) : 0;

  // 부족한 항목 분석
  const gaps = [];
  if (store.단골실 < top1.단골실) gaps.push({item:'타사단골모집', cur:store.단골실, top:top1.단골실, diff:top1.단골실-store.단골실, pts:(top1.단골실-store.단골실)});
  if (store.실010 < top1.실010) gaps.push({item:'010 실적', cur:store.실010, top:top1.실010, diff:top1.실010-store.실010, pts:(top1.실010-store.실010)});
  if (store.MNP실 < top1.MNP실) gaps.push({item:'MNP 실적', cur:store.MNP실, top:top1.MNP실, diff:top1.MNP실-store.MNP실, pts:(top1.MNP실-store.MNP실)*2});
  if (store.MVNO실 < top1.MVNO실) gaps.push({item:'MVNO 실적', cur:store.MVNO실, top:top1.MVNO실, diff:top1.MVNO실-store.MVNO실, pts:(top1.MVNO실-store.MVNO실)*3});
  if (store.초고속실 < top1.초고속실) gaps.push({item:'초고속 실적', cur:store.초고속실, top:top1.초고속실, diff:top1.초고속실-store.초고속실, pts:(top1.초고속실-store.초고속실)*3});
  if (store.IPTV실 < top1.IPTV실) gaps.push({item:'IPTV 실적', cur:store.IPTV실, top:top1.IPTV실, diff:top1.IPTV실-store.IPTV실, pts:(top1.IPTV실-store.IPTV실)*3});
  gaps.sort((a,b) => b.pts - a.pts);

  let html = `<p>현재 <span class="highlight">${store.store}</span>은(는) 전체 ${totalStores}개 매장 중 <span class="highlight">${myRank}위</span> (점수합: ${store.score}점)입니다.</p>`;
  html += `<p style="margin-top:8px">🎯 <strong>1위(${top1.store}, ${top1.score}점)</strong>와의 점수 차이: <span class="highlight">${scoreDiff1}점</span></p>`;

  if (prevStore && scoreDiffPrev > 0) {
    html += `<p style="margin-top:4px">⬆️ 바로 위 순위(${prevStore.store}, ${prevStore.score}점)와의 차이: <span class="highlight">${scoreDiffPrev}점</span></p>`;
  }

  html += `<p style="margin-top:12px; font-weight:700; color:#1a3a6b;">📌 상위 진입을 위한 핵심 개선 항목:</p><ul>`;

  if (gaps.length === 0) {
    html += `<li>모든 항목에서 1위와 동일한 실적입니다. 팀활동 점수 확보가 순위 상승의 열쇠입니다!</li>`;
  } else {
    gaps.slice(0, 3).forEach(g => {
      html += `<li><strong>${g.item}</strong>: 현재 ${g.cur}건 → 1위 수준(${g.top}건)까지 <span class="highlight">+${g.diff}건</span> 추가 시 약 <span class="highlight">+${g.pts}점</span> 획득 가능</li>`;
    });
  }

  // 팀활동 제안
  if (store.팀소계 === 0) {
    html += `<li>💡 <strong>팀활동 점수</strong>(최대 50점)가 0점입니다. 팀활동 참여 시 즉시 순위 상승 가능!</li>`;
  }

  html += `</ul>`;

  // 상위 10위 진입 가능성
  const top10score = allSorted[9] ? allSorted[9].score : 0;
  if (store.score < top10score) {
    const need = (top10score - store.score + 0.5).toFixed(1);
    html += `<p style="margin-top:10px">🚀 <strong>상위 10위 진입</strong>을 위해 약 <span class="highlight">+${need}점</span>이 필요합니다.</p>`;
  } else {
    html += `<p style="margin-top:10px">✅ 이미 <strong>상위 10위</strong> 내에 위치해 있습니다!</p>`;
  }

  return html;
}

/* ═══════════════════════════════════════════════
   렌더링: 대리점 1위 카드
═══════════════════════════════════════════════ */
function renderTopCards() {
  const topMap = getTopByAgency();
  let html = `<div class="section-title">🏅 대리점별 1위 매장</div><div id="top-cards">`;
  AGENCY_LIST.forEach(ag => {
    const d = topMap[ag];
    const cfg = AGENCY_CONFIG[ag] || {color:'#888', bg:'#f8f8f8', emoji:'⭐'};
    if (!d) {
      html += `<div class="top-card" style="border-left-color:${cfg.color}; background:${cfg.bg}">
        <div class="agency-name" style="color:${cfg.color}">${cfg.emoji} ${ag} 👑</div>
        <div class="store-name">데이터 없음</div>
        <div class="score">-</div>
      </div>`;
      return;
    }
    html += `<div class="top-card" style="border-left-color:${cfg.color}; background:${cfg.bg}">
      <div class="agency-name" style="color:${cfg.color}">${cfg.emoji} ${ag} 👑</div>
      <div class="store-name">${d.store}</div>
      <div class="score" style="color:${cfg.color}">${d.score}점</div>
      <div class="rank-badge">전체 ${d.rank}위 ${rankEmoji(d.rank)}</div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

/* ═══════════════════════════════════════════════
   렌더링: 대리점별 탭
═══════════════════════════════════════════════ */
function renderAgencyTable(agency) {
  const stores = RAW_DATA.filter(d => d.agency === agency).sort((a,b) => b.score - a.score);
  const cfg = AGENCY_CONFIG[agency] || {color:'#888', bg:'#fff', emoji:'⭐'};

    return `<p style="color:#94a3b8; padding:20px">해당 대리점 데이터가 없습니다.</p>`;

  const topScore = stores[0].score;

  <div class="summary-bar">
    <div class="summary-chip"><span class="chip-val" style="color:${cfg.color}">${stores.length}</span><span class="chip-lbl">소속 매장 수</span></div>

        <th>010</th>
        <th>MNP</th>
        <th>MVNO</th>
        <th>초고속</th>
        <th>IPTV</th>
        <th>매장실적소계</th>

/* ═══════════════════════════════════════════════
   탭 전환
═══════════════════════════════════════════════ */
let currentTab = 'all';

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  const tabMap = {
    'all':'종합현황','JS':'JS','서귀포':'서귀포','스마일':'스마일','앤유':'앤유',
    '오름':'오름','제주':'제주','제주E&T':'제주E&T','제주광양':'제주광양',
    '제주굿모닝':'제주굿모닝','제주정다운':'제주정다운','제주중앙':'제주중앙'
  };
  document.querySelectorAll('.tab-btn').forEach(btn => {
    if (btn.textContent.trim().includes(tabMap[tab] || tab)) btn.classList.add('active');
  });

  const main = document.getElementById('main');
  const cfg = tab !== 'all' ? (AGENCY_CONFIG[tab] || {color:'#1a3a6b', emoji:'📊'}) : {color:'#1a3a6b', emoji:'📊'};

  let content = '';
  if (tab === 'all') {
    content = renderTopCards() + `<div class="section-title" style="margin-top:24px">📋 전체 매장 종합현황</div>` + renderAllTable();
  } else {
    content = `<div class="section-title" style="color:${cfg.color}; border-color:${cfg.color}">${cfg.emoji} ${tab} 대리점 매장별 실적</div>` + renderAgencyTable(tab);
  }
  main.innerHTML = content;
}

/* ═══════════════════════════════════════════════
   AI 모달
═══════════════════════════════════════════════ */
function openAI(storeName) {
  const store = RAW_DATA.find(d => d.store === storeName);
  if (!store) return;
  document.getElementById('ai-modal-title').textContent = `🤖 AI 실적 분석 - ${storeName}`;
  document.getElementById('ai-modal-body').innerHTML = generateAIComment(store);
  document.getElementById('ai-modal-overlay').classList.add('show');
}

function closeAI() {
  document.getElementById('ai-modal-overlay').classList.remove('show');
}

document.getElementById('ai-modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeAI();
});

/* ═══════════════════════════════════════════════
   초기 렌더링
═══════════════════════════════════════════════ */
showTab('all');

// 탭 버튼 active 초기화 보정
document.querySelectorAll('.tab-btn')[0].classList.add('active');
</script>
