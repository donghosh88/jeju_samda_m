<title>삼다컨테스트 매장별 실적 대시보드</title>
<style>
  *, *::before, *::after { box-sizing: border-box !important; margin: 0; padding: 0; }
  :root {
    --primary: #003087;
    --accent: #e8002d;
    --bg: #f0f4fa;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --sub: #5a6a8a;
    --border: #d0daea;
    --shadow: 0 4px 18px rgba(0,48,135,0.10);
    --radius: 14px;
    /* 대리점 색상 */
    --c-js: #1565C0;
    --c-seoguipo: #00897B;
    --c-smile: #F57C00;
    --c-anyu: #8E24AA;
    --c-oreum: #D32F2F;
    --c-jeju: #0288D1;
    --c-jejuet: #558B2F;
    --c-jejugwangyang: #6D4C41;
    --c-jejugoodmorning: #E91E63;
    --c-jejujungdawoon: #00838F;
    --c-jejujungang: #5E35B1;
  }
  html, body { height: 100%; background: var(--bg); font-family: 'Segoe UI', 'Noto Sans KR', sans-serif; color: var(--text); }
  body { min-width: 320px; }

  /* 보안 */
  body { user-select: none; -webkit-user-select: none; }

  /* 헤더 */
  .dashboard-header {
    background: linear-gradient(135deg, #003087 0%, #0055cc 60%, #1976D2 100%);
    color: #fff;
    text-align: center;
    padding: 32px 20px 20px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,48,135,0.25);
  }
  .dashboard-title {
    font-size: 2.4rem; font-weight: 900; letter-spacing: -1px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .dashboard-date {
    font-size: 0.78rem; font-weight: 700; margin-top: 6px;
    color: #b3d4ff; letter-spacing: 1px;
  }

  /* 탭 네비게이션 */
  .tab-nav {
    display: flex; flex-wrap: wrap; gap: 6px;
    background: #fff; padding: 12px 20px;
    border-bottom: 2px solid var(--border);
    position: sticky; top: 108px; z-index: 99;
    overflow-x: auto;
  }
  .tab-btn {
    padding: 7px 16px; border-radius: 20px; border: 2px solid var(--border);
    background: #f5f7fb; color: var(--sub); font-size: 0.82rem; font-weight: 700;
    cursor: pointer; transition: all 0.18s; white-space: nowrap;
  }
  .tab-btn:hover { background: #e3ecff; border-color: var(--primary); color: var(--primary); }
  .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* 메인 컨텐츠 */
  .main-content { padding: 24px 20px; max-width: 1600px; margin: 0 auto; }

  /* 대리점 1위 카드 섹션 */
  .top-cards-section { margin-bottom: 28px; }
  .section-label {
    font-size: 1rem; font-weight: 800; color: var(--primary);
    margin-bottom: 14px; letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::before { content: ''; display: inline-block; width: 4px; height: 18px; background: var(--primary); border-radius: 2px; }
  .top-cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }
  .top-card {
    border-radius: var(--radius); padding: 18px 16px 14px;
    color: #fff; box-shadow: var(--shadow);
    position: relative; overflow: hidden;
    min-height: 110px;
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .top-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,0.18); }
  .top-card::after {
    content: ''; position: absolute; right: -18px; bottom: -18px;
    width: 80px; height: 80px; border-radius: 50%;
    background: rgba(255,255,255,0.10);
  }
  .top-card-agency { font-size: 1.1rem; font-weight: 900; display: flex; align-items: center; gap: 6px; }
  .top-card-store { font-size: 0.78rem; font-weight: 600; margin-top: 4px; opacity: 0.88; }
  .top-card-score { font-size: 1.25rem; font-weight: 700; margin-top: 10px; }
  .top-card-score span { font-size: 0.72rem; font-weight: 400; opacity: 0.8; }

  /* 탭 패널 */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* 테이블 공통 */
  .table-wrap { overflow-x: auto; overflow-y: auto; border-radius: var(--radius); box-shadow: var(--shadow); background: #fff; }
  table { width: 100%; border-collapse: collapse; min-width: 900px; font-size: 0.82rem; }
  thead tr { background: linear-gradient(90deg, #003087, #1565C0); color: #fff; }
  thead th {
    padding: 11px 10px; text-align: center; font-weight: 700;
    white-space: nowrap; border-right: 1px solid rgba(255,255,255,0.15);
    position: sticky; top: 0; z-index: 10;
  }
  thead th:last-child { border-right: none; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
  tbody tr:hover { background: #e8f0fe !important; }
  tbody tr:nth-child(even) { background: #f7f9fd; }
  tbody td {
    padding: 9px 10px; text-align: center; white-space: nowrap;
    border-right: 1px solid var(--border); cursor: default;
    position: relative;
  }
  tbody td:last-child { border-right: none; }
  .rank-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 50%;
    font-weight: 800; font-size: 0.85rem;
  }
  .rank-1 { background: #FFD700; color: #7a5800; }
  .rank-2 { background: #C0C0C0; color: #444; }
  .rank-3 { background: #CD7F32; color: #fff; }
  .rank-other { background: #e8eaf6; color: #555; }
  .score-high { color: #1565C0; font-weight: 800; }
  .score-mid { color: #2e7d32; font-weight: 700; }
  .score-low { color: #c62828; font-weight: 600; }
  .store-name { font-weight: 700; text-align: left !important; padding-left: 14px !important; }
  .agency-name { font-weight: 700; text-align: left !important; padding-left: 14px !important; }

  /* AI 코멘트 버튼 */
  .ai-btn {
    padding: 4px 10px; border-radius: 12px; border: none;
    background: linear-gradient(90deg, #003087, #1976D2);
    color: #fff; font-size: 0.72rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .ai-btn:hover { background: linear-gradient(90deg, #1565C0, #42a5f5); transform: scale(1.05); }

  /* AI 코멘트 모달 */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 1000;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #fff; border-radius: 18px; padding: 30px 28px;
    max-width: 520px; width: 92%; box-shadow: 0 12px 48px rgba(0,0,0,0.22);
    position: relative; max-height: 80vh; overflow-y: auto;
  }
  .modal-title { font-size: 1.1rem; font-weight: 900; color: var(--primary); margin-bottom: 14px; }
  .modal-body { font-size: 0.88rem; line-height: 1.75; color: #333; }
  .modal-close {
    position: absolute; top: 14px; right: 16px;
    background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #888;
  }
  .modal-close:hover { color: var(--accent); }

  /* 툴팁 */
  [data-tooltip] { position: relative; }
  [data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: #1a1a2e; color: #fff; padding: 5px 10px; border-radius: 7px;
    font-size: 0.72rem; white-space: nowrap; z-index: 200;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    pointer-events: none;
  }

  /* 반응형 */
  @media (max-width: 768px) {
    .dashboard-title { font-size: 1.5rem; }
    .tab-nav { top: 88px; padding: 8px 10px; }
    .main-content { padding: 14px 8px; }
    .top-cards-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    .top-card { padding: 13px 11px 10px; min-height: 90px; }
    .top-card-agency { font-size: 0.92rem; }
    table { font-size: 0.74rem; }
    thead th, tbody td { padding: 7px 6px; }
  }
  @media (max-width: 480px) {
    .dashboard-title { font-size: 1.15rem; }
    .top-cards-grid { grid-template-columns: 1fr 1fr; }
  }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: #f0f4fa; }
  ::-webkit-scrollbar-thumb { background: #b0c4de; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #7a9cc8; }

  /* 대리점 행 색상 (종합현황) */
  .row-js td:first-child { border-left: 4px solid var(--c-js); }
  .row-seoguipo td:first-child { border-left: 4px solid var(--c-seoguipo); }
  .row-smile td:first-child { border-left: 4px solid var(--c-smile); }
  .row-anyu td:first-child { border-left: 4px solid var(--c-anyu); }
  .row-oreum td:first-child { border-left: 4px solid var(--c-oreum); }
  .row-jeju td:first-child { border-left: 4px solid var(--c-jeju); }
  .row-jejuet td:first-child { border-left: 4px solid var(--c-jejuet); }
  .row-jejugwangyang td:first-child { border-left: 4px solid var(--c-jejugwangyang); }
  .row-jejugoodmorning td:first-child { border-left: 4px solid var(--c-jejugoodmorning); }
  .row-jejujungdawoon td:first-child { border-left: 4px solid var(--c-jejujungdawoon); }
  .row-jejujungang td:first-child { border-left: 4px solid var(--c-jejujungang); }

  .zero-val { color: #bbb; }
  .highlight-top { background: linear-gradient(90deg, #fffde7, #fff9c4) !important; }
</style>
</head>

        (e.ctrlKey && e.shiftKey && e.keyCode === 74) ||
        (e.ctrlKey && e.keyCode === 85) ||

  "JS": "#1565C0",
  "서귀포": "#00897B",
  "스마일": "#F57C00",
  "앤유": "#8E24AA",

  "제주중앙": "#5E35B1"
};

const agencyList = ["JS","서귀포","스마일","앤유","오름","제주","제주E&T","제주광양","제주굿모닝","제주정다운","제주중앙"];

// 대리점별 1위 매장 찾기
function getTopStorePerAgency() {
  const topMap = {};
  rawData.forEach(d => {
    if (!topMap[d.agency] || d.score > topMap[d.agency].score) {
      topMap[d.agency] = d;
    }
  });
  return topMap;
}

// 대리점 1위 카드 렌더링
function renderTopCards() {
  const topMap = getTopStorePerAgency();
  const grid = document.getElementById('topCardsGrid');
  grid.innerHTML = '';
  agencyList.forEach(agency => {
    const d = topMap[agency];
    if (!d) return;
    const color = agencyColors[agency] || '#333';
    const card = document.createElement('div');
    card.className = 'top-card';
    card.style.background = `linear-gradient(135deg, ${color} 0%, ${color}cc 100%)`;
    card.innerHTML = `
      <div class="top-card-agency">${agency} 👑</div>
      <div class="top-card-store">${d.store}</div>
      <div class="top-card-score">${d.score.toFixed(1)}점 <span>/ 점수합</span></div>
    `;
    grid.appendChild(card);
  });
}

// 점수 색상 클래스
function scoreClass(score) {
  if (score >= 70) return 'score-high';
  if (score >= 40) return 'score-mid';
  return 'score-low';
}

// 순위 배지
function rankBadge(rank) {
  let cls = 'rank-other';
  if (rank === 1) cls = 'rank-1';
  else if (rank === 2) cls = 'rank-2';
  else if (rank === 3) cls = 'rank-3';
  return `<span class="rank-badge ${cls}">${rank}</span>`;
}

// 값 표시 (0이면 회색)
function valCell(real, score, label) {
  const display = real === 0 ? `<span class="zero-val">0</span>` : real;
  return `<td data-tooltip="실적: ${real}건 | 환산점수: ${score}점">${display}</td>`;
}

// 종합현황 테이블 렌더링
function renderOverview() {
  const tbody = document.getElementById('overviewBody');
  tbody.innerHTML = '';
  const sorted = [...rawData].sort((a,b) => a.rank - b.rank || b.score - a.score);
  sorted.forEach(d => {
    const agencyKey = d.agency.replace(/[^a-zA-Z가-힣]/g,'').toLowerCase();
    const rowClass = `row-${getAgencyClass(d.agency)}`;
    const isTop = d.rank <= 3;
    const tr = document.createElement('tr');
    if (isTop) tr.classList.add('highlight-top');
    tr.className += ` ${rowClass}`;
    tr.innerHTML = `
      <td class="agency-name" style="color:${agencyColors[d.agency]||'#333'};font-weight:800;">${d.agency}</td>
      <td class="store-name">${d.store}</td>
      <td>${rankBadge(d.rank)}</td>
      <td class="${scoreClass(d.score)}" data-tooltip="점수합: ${d.score}점">${d.score.toFixed(1)}</td>
      ${valCell(d.tasangol_real, d.tasangol_score, '타사단골모집')}
      ${valCell(d._010_real, d._010_score, '010')}
      ${valCell(d.mnp_real, d.mnp_score, 'MNP')}
      ${valCell(d.mvno_real, d.mvno_score, 'MVNO')}
      ${valCell(d.superspeed_real, d.superspeed_score, '초고속')}
      ${valCell(d.iptv_real, d.iptv_score, 'IPTV')}
      <td data-tooltip="매장실적 소계: ${d.store_subtotal}점" class="${scoreClass(d.store_subtotal)}">${d.store_subtotal}</td>
      <td data-tooltip="팀활동 20점 항목">${d.team_20 > 0 ? d.team_20 : '<span class="zero-val">-</span>'}</td>
      <td data-tooltip="팀활동 30점 항목">${d.team_30 > 0 ? d.team_30 : '<span class="zero-val">-</span>'}</td>
      <td data-tooltip="팀활동 소계: ${d.team_total}점">${d.team_total > 0 ? d.team_total : '<span class="zero-val">0</span>'}</td>
    `;
    tbody.appendChild(tr);
  });
}

function getAgencyClass(agency) {
  const map = {
    "JS":"js","서귀포":"seoguipo","스마일":"smile","앤유":"anyu","오름":"oreum",
    "제주":"jeju","제주E&T":"jejuet","제주광양":"jejugwangyang",
    "제주굿모닝":"jejugoodmorning","제주정다운":"jejujungdawoon","제주중앙":"jejujungang"
  };
  return map[agency] || 'jeju';
}

// AI 코멘트 생성
function generateAIComment(store, data, allData) {
  const sorted = [...allData].sort((a,b) => b.score - a.score);
  const currentRank = sorted.findIndex(d => d.store === store) + 1;
  const totalStores = allData.length;

  if (currentRank === 1) {
    return `🥇 <strong>${store}</strong>은(는) 현재 전체 ${totalStores}개 매장 중 <strong>1위</strong>입니다! 최고의 실적을 유지하고 있습니다. 지속적인 성과 유지를 위해 팀활동 참여와 전 항목 균형 있는 실적 관리를 권장합니다.`;
  }

  const target5 = sorted[4]; // 5위
  const target10 = sorted[9]; // 10위
  const target20 = sorted[19]; // 20위
  const top1 = sorted[0];

  let targetRank, targetData;
  if (currentRank > 20) { targetRank = 20; targetData = target20; }
  else if (currentRank > 10) { targetRank = 10; targetData = target10; }
  else { targetRank = 5; targetData = target5; }

  if (!targetData) { targetRank = 1; targetData = top1; }

  const scoreDiff = (targetData.score - data.score).toFixed(1);
  const storeDiff = targetData.store_subtotal - data.store_subtotal;
  const teamDiff = targetData.team_total - data.team_total;

  // 부족한 항목 분석
  const gaps = [];
  if (data.tasangol_real < targetData.tasangol_real) gaps.push(`타사단골모집 +${targetData.tasangol_real - data.tasangol_real}건`);
  if (data._010_real < targetData._010_real) gaps.push(`010 +${targetData._010_real - data._010_real}건`);
  if (data.mnp_real < targetData.mnp_real) gaps.push(`MNP +${targetData.mnp_real - data.mnp_real}건`);
  if (data.mvno_real < targetData.mvno_real) gaps.push(`MVNO +${targetData.mvno_real - data.mvno_real}건`);
  if (data.superspeed_real < targetData.superspeed_real) gaps.push(`초고속 +${targetData.superspeed_real - data.superspeed_real}건`);
  if (data.iptv_real < targetData.iptv_real) gaps.push(`IPTV +${targetData.iptv_real - data.iptv_real}건`);

  let teamComment = '';
  if (data.team_20 === 0) teamComment += ' S26 AI 컨테스트 참여(+20점)';
  if (data.team_30 === 0) teamComment += ' 유심교체 도움/VMD 부착(+30점)';

  let comment = `📊 <strong>${store}</strong> 현재 전체 <strong>${currentRank}위</strong> (점수합: ${data.score}점)<br><br>`;
  comment += `🎯 <strong>${targetRank}위(${targetData.store})</strong>까지 <strong>${scoreDiff}점</strong> 차이입니다.<br><br>`;

  if (gaps.length > 0) {
    comment += `📈 <strong>실적 개선 필요 항목:</strong><br>`;
    gaps.forEach(g => { comment += `&nbsp;&nbsp;• ${g}<br>`; });
    comment += `<br>`;
  }

  if (teamComment) {
    comment += `🏃 <strong>팀활동 미참여 항목:</strong>${teamComment}<br><br>`;
  }

  // 강점 분석
  const strengths = [];
  if (data.tasangol_real >= top1.tasangol_real * 0.7) strengths.push('타사단골모집');
  if (data._010_real >= top1._010_real * 0.7) strengths.push('010');
  if (data.mnp_real >= top1.mnp_real * 0.7) strengths.push('MNP');
  if (data.superspeed_real >= top1.superspeed_real * 0.7) strengths.push('초고속');
  if (data.iptv_real >= top1.iptv_real * 0.7) strengths.push('IPTV');

  if (strengths.length > 0) {
    comment += `💪 <strong>강점 항목:</strong> ${strengths.join(', ')} — 이 항목들은 상위권 수준을 유지하고 있습니다.<br><br>`;
  }

  comment += `✅ <strong>종합 전략:</strong> 팀활동 완전 참여 시 최대 50점 추가 가능합니다. 실적 항목 중 MNP(×2배 환산)와 초고속(×3배 환산), IPTV(×3배 환산)의 점수 효율이 높으므로 해당 항목 집중 공략을 권장합니다.`;

  return comment;
}

// 대리점별 탭 렌더링
function renderAgencyTab(agency) {
  const headId = `agencyHead-${agency}`;
  const bodyId = `agencyBody-${agency}`;
  const head = document.getElementById(headId);
  const tbody = document.getElementById(bodyId);
  if (!head || !tbody) return;

  const color = agencyColors[agency] || '#003087';

  head.innerHTML = `<tr style="background:linear-gradient(90deg,${color},${color}cc)">
    <th>매장</th>
    <th>점수합</th>
    <th>AI 코멘트</th>
    <th>타사단골모집</th>
    <th>010</th>
    <th>MNP</th>
    <th>MVNO</th>
    <th>초고속</th>
    <th>IPTV</th>
    <th>매장실적소계</th>
    <th>팀활동20점</th>
    <th>팀활동30점</th>
    <th>팀활동소계</th>
  </tr>`;

  const agencyData = rawData.filter(d => d.agency === agency).sort((a,b) => b.score - a.score);
  tbody.innerHTML = '';

  agencyData.forEach((d, idx) => {
    const isTop = idx === 0;
    const tr = document.createElement('tr');
    if (isTop) tr.classList.add('highlight-top');

    const aiBtn = `<button class="ai-btn" onclick="showAIComment('${d.store.replace(/'/g,"\\'")}')">🤖 분석</button>`;

    tr.innerHTML = `
      <td class="store-name" style="color:${color};font-weight:800;">${isTop ? '👑 ' : ''}${d.store}</td>
      <td class="${scoreClass(d.score)}" data-tooltip="점수합: ${d.score}점">${d.score.toFixed(1)}</td>
      <td>${aiBtn}</td>
      ${valCell(d.tasangol_real, d.tasangol_score, '타사단골모집')}
      ${valCell(d._010_real, d._010_score, '010')}
      ${valCell(d.mnp_real, d.mnp_score, 'MNP')}
      ${valCell(d.mvno_real, d.mvno_score, 'MVNO')}
      ${valCell(d.superspeed_real, d.superspeed_score, '초고속')}
      ${valCell(d.iptv_real, d.iptv_score, 'IPTV')}
      <td data-tooltip="매장실적 소계: ${d.store_subtotal}점" class="${scoreClass(d.store_subtotal)}">${d.store_subtotal}</td>
      <td data-tooltip="팀활동 20점 항목">${d.team_20 > 0 ? d.team_20 : '<span class="zero-val">-</span>'}</td>
      <td data-tooltip="팀활동 30점 항목">${d.team_30 > 0 ? d.team_30 : '<span class="zero-val">-</span>'}</td>
      <td data-tooltip="팀활동 소계: ${d.team_total}점">${d.team_total > 0 ? d.team_total : '<span class="zero-val">0</span>'}</td>
    `;
    tbody.appendChild(tr);
  });
}

// AI 코멘트 모달 표시
function showAIComment(storeName) {
  const data = rawData.find(d => d.store === storeName);
  if (!data) return;
  const comment = generateAIComment(storeName, data, rawData);
  document.getElementById('modalTitle').innerHTML = `🤖 AI 실적 분석 — ${storeName}`;
  document.getElementById('modalBody').innerHTML = comment;
  document.getElementById('aiModal').classList.add('open');
}

function closeModal() {
  document.getElementById('aiModal').classList.remove('open');
}

// 탭 전환
function switchTab(tabId, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (tabId === 'overview') {
    document.getElementById('panel-overview').classList.add('active');
  } else {
    const panel = document.getElementById(`panel-${tabId}`);
    if (panel) {
      panel.classList.add('active');
      renderAgencyTab(tabId);
    }
  }
}

// 모달 외부 클릭 닫기
document.getElementById('aiModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// 초기화
renderTopCards();
renderOverview();
agencyList.forEach(a => renderAgencyTab(a));
</script>
