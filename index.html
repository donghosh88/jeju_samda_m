<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>삼다컨테스트 매장별 실적 대시보드</title>
<style>
  *, *::before, *::after { box-sizing: border-box !important; margin: 0; padding: 0; }
  :root {
    --primary: #1a3a6b;
    --primary-light: #2563eb;
    --accent: #f59e0b;
    --bg: #f0f4f8;
    --card-bg: #ffffff;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --shadow: 0 4px 20px rgba(0,0,0,0.10);
    --radius: 14px;
    /* 대리점 색상 */
    --c-js: #2563eb;
    --c-seoguipo: #10b981;
    --c-smile: #f59e0b;
    --c-anyu: #ec4899;
    --c-oreum: #8b5cf6;
    --c-jeju: #06b6d4;
    --c-jejuet: #ef4444;
    --c-jejugwangyang: #f97316;
    --c-jejugoodmorning: #84cc16;
    --c-jejujungdawoon: #14b8a6;
    --c-jejujungang: #6366f1;
  }
  html, body { height: 100%; font-family: 'Segoe UI', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); }
  body { min-width: 320px; }

  /* ── 헤더 ── */
  #header {
    background: linear-gradient(135deg, #1a3a6b 0%, #2563eb 100%);
    color: #fff;
    text-align: center;
    padding: 28px 20px 18px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(26,58,107,0.25);
  }
  #header h1 { font-size: 2.4rem; font-weight: 900; letter-spacing: -1px; text-shadow: 0 2px 8px rgba(0,0,0,0.18); }
  #header .date-label { font-size: 0.78rem; font-weight: 700; margin-top: 5px; color: #bfdbfe; letter-spacing: 1px; }

  /* ── 탭 ── */
  #tab-bar {
    display: flex; flex-wrap: wrap; gap: 6px;
    background: #fff; padding: 12px 16px;
    border-bottom: 2px solid var(--border);
    position: sticky; top: 96px; z-index: 90;
    overflow-x: auto;
  }
  .tab-btn {
    padding: 7px 16px; border-radius: 20px; border: 2px solid var(--border);
    background: #f8fafc; color: var(--text-muted); font-size: 0.82rem; font-weight: 700;
    cursor: pointer; transition: all .2s; white-space: nowrap;
  }
  .tab-btn:hover { background: var(--primary-light); color: #fff; border-color: var(--primary-light); }
  .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* ── 대리점 1위 카드 ── */
  #top-cards {
    display: flex; flex-wrap: wrap; gap: 14px;
    padding: 20px 20px 10px;
    overflow-x: auto;
  }
  .top-card {
    flex: 1 1 160px; min-width: 150px; max-width: 220px;
    border-radius: var(--radius); padding: 16px 14px 12px;
    box-shadow: var(--shadow); color: #fff;
    position: relative; overflow: hidden;
    transition: transform .2s;
  }
  .top-card:hover { transform: translateY(-4px); }
  .top-card::before {
    content: ''; position: absolute; top: -30px; right: -30px;
    width: 90px; height: 90px; border-radius: 50%;
    background: rgba(255,255,255,0.12);
  }
  .top-card .agency-name { font-size: 1.1rem; font-weight: 900; display: flex; align-items: center; gap: 6px; }
  .top-card .store-name { font-size: 0.78rem; font-weight: 600; margin-top: 4px; opacity: .88; }
  .top-card .score { font-size: 1.05rem; font-weight: 400; margin-top: 8px; opacity: .95; }
  .top-card .crown { font-size: 1.3rem; }

  /* ── 콘텐츠 영역 ── */
  #content { padding: 10px 20px 40px; overflow-x: auto; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── 테이블 공통 ── */
  .table-wrap { overflow-x: auto; overflow-y: auto; border-radius: var(--radius); box-shadow: var(--shadow); background: #fff; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 900px; }
  thead tr { background: var(--primary); color: #fff; }
  thead th { padding: 11px 10px; text-align: center; font-weight: 700; white-space: nowrap; border-right: 1px solid rgba(255,255,255,0.15); position: sticky; top: 0; z-index: 5; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:hover { background: #eff6ff !important; }
  tbody td { padding: 9px 10px; text-align: center; white-space: nowrap; border-right: 1px solid var(--border); cursor: default; }
  tbody tr:nth-child(even) { background: #f8fafc; }

  /* 순위 배지 */
  .rank-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 50%; font-weight: 800; font-size: 0.85rem;
  }
  .rank-1 { background: #fbbf24; color: #78350f; }
  .rank-2 { background: #94a3b8; color: #1e293b; }
  .rank-3 { background: #cd7c3a; color: #fff; }
  .rank-other { background: #e2e8f0; color: #475569; }

  /* 점수합 강조 */
  .score-high { color: #1d4ed8; font-weight: 800; }

  /* 전월대비 색상 */
  .up { color: #16a34a; font-weight: 600; }
  .down { color: #dc2626; font-weight: 600; }
  .none-cur { color: #94a3b8; }
  .prev-none-cur { color: #f59e0b; font-weight: 600; }

  /* AI 코멘트 버튼 */
  .ai-btn {
    padding: 4px 10px; border-radius: 12px; border: none;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    color: #fff; font-size: 0.72rem; font-weight: 700; cursor: pointer;
    transition: opacity .2s; white-space: nowrap;
  }
  .ai-btn:hover { opacity: .82; }

  /* AI 코멘트 모달 */
  #ai-modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 999;
    align-items: center; justify-content: center;
  }
  #ai-modal-overlay.show { display: flex; }
  #ai-modal {
    background: #fff; border-radius: 18px; padding: 28px 28px 22px;
    max-width: 520px; width: 92%; box-shadow: 0 8px 40px rgba(0,0,0,0.22);
    position: relative; max-height: 80vh; overflow-y: auto;
  }
  #ai-modal h3 { font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-bottom: 14px; }
  #ai-modal .ai-content { font-size: 0.88rem; line-height: 1.75; color: var(--text); }
  #ai-modal .ai-content strong { color: #2563eb; }
  #ai-modal .close-btn {
    position: absolute; top: 14px; right: 16px;
    background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #94a3b8;
  }
  #ai-modal .close-btn:hover { color: #1e293b; }

  /* 툴팁 */
  [data-tooltip] { position: relative; }
  [data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
    background: #1e293b; color: #fff; padding: 5px 10px; border-radius: 7px;
    font-size: 0.72rem; white-space: nowrap; z-index: 200; pointer-events: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }

  /* 대리점 색상 태그 */
  .agency-tag {
    display: inline-block; padding: 2px 9px; border-radius: 10px;
    font-size: 0.75rem; font-weight: 700; color: #fff;
  }

  /* 반응형 */
  @media (max-width: 768px) {
    #header h1 { font-size: 1.5rem; }
    #tab-bar { top: 78px; }
    .top-card { min-width: 130px; }
    #content { padding: 8px 8px 30px; }
    table { font-size: 0.74rem; }
  }
  @media (max-width: 480px) {
    #header h1 { font-size: 1.15rem; }
    .top-card { flex: 1 1 120px; }
  }

  /* 섹션 타이틀 */
  .section-title {
    font-size: 1.05rem; font-weight: 800; color: var(--primary);
    margin: 18px 0 10px; padding-left: 10px;
    border-left: 4px solid var(--primary-light);
  }

  /* 팀활동 체크 */
  .check-yes { color: #16a34a; font-weight: 700; }
  .check-no { color: #e2e8f0; }
</style>
</head>

<!-- 보안 차단 -->
<script>
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    if (e.keyCode === 123 ||
        (e.ctrlKey && e.shiftKey && e.keyCode === 73) ||
        (e.ctrlKey && e.shiftKey && e.keyCode === 74) ||
        (e.ctrlKey && e.keyCode === 85) ||
        (e.ctrlKey && e.keyCode === 83)) {
      e.preventDefault();
    }
  });
</script>

/* ─── 대리점 색상 맵 ─── */
const AGENCY_COLORS = {
  "JS":       {bg:"#2563eb", light:"#dbeafe"},
  "서귀포":   {bg:"#10b981", light:"#d1fae5"},
  "스마일":   {bg:"#f59e0b", light:"#fef3c7"},

  "오름":     {bg:"#8b5cf6", light:"#ede9fe"},
  "제주":     {bg:"#06b6d4", light:"#cffafe"},
  "제주E&T":  {bg:"#ef4444", light:"#fee2e2"},
  "제주광양": {bg:"#f97316", light:"#ffedd5"},
  "제주굿모닝":{bg:"#65a30d", light:"#ecfccb"},
  "제주정다운":{bg:"#14b8a6", light:"#ccfbf1"},
  "제주중앙": {bg:"#6366f1", light:"#e0e7ff"}
};

/* ─── 대리점 목록 ─── */
const AGENCIES = ["JS","서귀포","스마일","앤유","오름","제주","제주E&T","제주광양","제주굿모닝","제주정다운","제주중앙"];

/* ─── 전월대비 셀 스타일 ─── */
function prevClass(v) {
  if (!v) return '';
  if (v === '당월無') return 'none-cur';
  if (v === '전월無당월有') return 'prev-none-cur';
  if (v.startsWith('▲')) return 'up';
  if (v.startsWith('▼')) return 'down';
  return '';
}

/* ─── 순위 배지 ─── */
function rankBadge(r) {
  let cls = r===1?'rank-1':r===2?'rank-2':r===3?'rank-3':'rank-other';
  return `<span class="rank-badge ${cls}">${r}</span>`;
}

/* ─── 팀활동 표시 ─── */
function teamCell(v, label) {
  if (v === null || v === undefined || v === 0 || v === '') {
    return `<span class="check-no" data-tooltip="${label}: 미참여">—</span>`;
  }
  return `<span class="check-yes" data-tooltip="${label}: ${v}점">✔ ${v}</span>`;
}

/* ─── 대리점별 1위 매장 카드 렌더링 ─── */
function renderTopCards() {
  const container = document.getElementById('top-cards');
  let html = '';
  AGENCIES.forEach(ag => {
    const stores = RAW_DATA.filter(d => d.agency === ag).sort((a,b) => b.score - a.score);
    if (!stores.length) return;
    const top = stores[0];
    const col = AGENCY_COLORS[ag] || {bg:'#64748b'};
    html += `
      <div class="top-card" style="background:linear-gradient(135deg,${col.bg}dd,${col.bg}99);"
           data-tooltip="대리점: ${ag} | 1위 매장: ${top.store} | 점수합: ${top.score}점">
        <div class="agency-name">${ag} <span class="crown">👑</span></div>
        <div class="store-name">${top.store}</div>
        <div class="score">점수합: <strong>${top.score}점</strong></div>
      </div>`;
  });
  container.innerHTML = html;
}

/* ─── 종합현황 테이블 ─── */
function renderAll() {
  const sorted = [...RAW_DATA].sort((a,b) => a.rank - b.rank || b.score - a.score);
  const col = (ag) => AGENCY_COLORS[ag]?.bg || '#64748b';
  let rows = sorted.map(d => {
    return `<tr>
      <td data-tooltip="대리점: ${d.agency}">
        <span class="agency-tag" style="background:${col(d.agency)}">${d.agency}</span>
      </td>
      <td data-tooltip="당월 순위: ${d.rank}위">${rankBadge(d.rank)}</td>
      <td data-tooltip="점수합: ${d.score}점" class="score-high">${d.score}</td>
      <td data-tooltip="타사단골모집 실적: ${d.dangol_real}건 / 환산점수: ${d.dangol_score}점">${d.dangol_real}</td>
      <td data-tooltip="010 실적: ${d.o10_real}건 / 환산점수: ${d.o10_score}점">${d.o10_real}</td>
      <td data-tooltip="MNP 실적: ${d.mnp_real}건 / 환산점수: ${d.mnp_score}점">${d.mnp_real}</td>
      <td data-tooltip="MVNO 실적: ${d.mvno_real}건 / 환산점수: ${d.mvno_score}점">${d.mvno_real}</td>
      <td data-tooltip="초고속 실적: ${d.speed_real}건 / 환산점수: ${d.speed_score}점">${d.speed_real}</td>
      <td data-tooltip="IPTV 실적: ${d.iptv_real}건 / 환산점수: ${d.iptv_score}점">${d.iptv_real}</td>
      <td data-tooltip="당월 매장실적 소계: ${d.store_sub}점" style="font-weight:700;color:#1d4ed8">${d.store_sub}</td>
      <td data-tooltip="팀활동 20점 (S26 AI 컨테스트 참여)">${d.team20 ?? '—'}</td>
      <td data-tooltip="팀활동 30점 (유심교체 도움 VMD 부착)">${d.team30 ?? '—'}</td>
      <td data-tooltip="당월 팀활동 소계: ${d.team_sub}점" style="font-weight:700">${d.team_sub}</td>
    </tr>`;
  }).join('');

  document.getElementById('panel-all').innerHTML = `
    <div class="section-title">📋 전체 매장 종합현황 (39개 매장)</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>대리점</th><th>순위</th><th>점수합</th>
            <th>타사단골모집</th><th>010</th><th>MNP</th><th>MVNO</th><th>초고속</th><th>IPTV</th>
            <th>매장실적소계</th><th>팀활동20점</th><th>팀활동30점</th><th>팀활동소계</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

/* ─── AI 코멘트 생성 ─── */
function generateAIComment(store) {
  const allSorted = [...RAW_DATA].sort((a,b) => b.score - a.score);
  const myIdx = allSorted.findIndex(d => d.store === store.store);
  const myRank = myIdx + 1;
  const total = allSorted.length;

  if (myRank === 1) {
    return `<strong>🏆 현재 전체 1위!</strong><br>현재 점수합 <strong>${store.score}점</strong>으로 전체 ${total}개 매장 중 <strong>1위</strong>를 유지하고 있습니다.<br>지금의 실적을 유지하며 팀활동 참여를 지속하면 최상위 자리를 지킬 수 있습니다!`;
  }

  const above = allSorted.slice(0, myIdx);
  const nextTarget = above[above.length - 1];
  const gap = +(nextTarget.score - store.score).toFixed(1);

  // 부족한 항목 분석
  const items = [
    {name:'타사단골모집', real: store.dangol_real, score: store.dangol_score, topReal: nextTarget.dangol_real, topScore: nextTarget.dangol_score, mult:1},
    {name:'010', real: store.o10_real, score: store.o10_score, topReal: nextTarget.o10_real, topScore: nextTarget.o10_score, mult:1},
    {name:'MNP', real: store.mnp_real, score: store.mnp_score, topReal: nextTarget.mnp_real, topScore: nextTarget.mnp_score, mult:2},
    {name:'MVNO', real: store.mvno_real, score: store.mvno_score, topReal: nextTarget.mvno_real, topScore: nextTarget.mvno_score, mult:3},
    {name:'초고속', real: store.speed_real, score: store.speed_score, topReal: nextTarget.speed_real, topScore: nextTarget.speed_score, mult:3},
    {name:'IPTV', real: store.iptv_real, score: store.iptv_score, topReal: nextTarget.iptv_real, topScore: nextTarget.iptv_score, mult:3},
  ];

  const weakItems = items.filter(i => i.score < i.topScore).sort((a,b) => (b.topScore - b.score) - (a.topScore - a.score));
  const teamGap = (nextTarget.team_sub || 0) - (store.team_sub || 0);

  let comment = `<strong>📍 현재 위치:</strong> 전체 ${total}개 매장 중 <strong>${myRank}위</strong> (점수합: ${store.score}점)<br>`;
  comment += `<strong>🎯 바로 위 목표:</strong> <strong>${nextTarget.store}</strong> (${nextTarget.score}점) — <span style="color:#ef4444">점수 차이: ${gap}점</span><br><br>`;

  comment += `<strong>📈 개선 필요 항목:</strong><br>`;
  if (weakItems.length === 0) {
    comment += `모든 실적 항목이 바로 위 매장과 동등하거나 우수합니다.<br>`;
  } else {
    weakItems.slice(0, 3).forEach(item => {
      const diff = item.topReal - item.real;
      const scoreDiff = item.topScore - item.score;
      comment += `• <strong>${item.name}</strong>: 현재 ${item.real}건(${item.score}점) → 목표 ${item.topReal}건(${item.topScore}점) — <span style="color:#2563eb">+${diff}건 추가 시 +${scoreDiff}점 획득 가능</span><br>`;
    });
  }

  if (teamGap > 0) {
    comment += `<br>• <strong>팀활동</strong>: 현재 ${store.team_sub}점 → 목표 ${nextTarget.team_sub}점 — <span style="color:#f59e0b">팀활동 참여로 +${teamGap}점 추가 가능</span><br>`;
  }

  // 상위 10위권 진입 분석
  const top10 = allSorted[9];
  if (myRank > 10) {
    const gapTo10 = +(top10.score - store.score).toFixed(1);
    comment += `<br><strong>🚀 상위 10위 진입 목표:</strong><br>`;
    comment += `10위 <strong>${top10.store}</strong>(${top10.score}점)까지 <span style="color:#ef4444"><strong>${gapTo10}점</strong></span> 차이입니다.<br>`;
    comment += `MNP·초고속·IPTV 등 고배점 항목 집중 공략 + 팀활동 완료 시 단기간 내 10위권 진입이 가능합니다.`;
  }

  return comment;
}

/* ─── 대리점별 탭 렌더링 ─── */
function renderAgency(ag) {

  const col = AGENCY_COLORS[ag] || {bg:'#64748b', light:'#f1f5f9'};
  const allSorted = [...RAW_DATA].sort((a,b) => b.score - a.score);

  let rows = stores.map(d => {
    const globalRank = allSorted.findIndex(x => x.store === d.store) + 1;
    return `<tr>
      <td data-tooltip="매장명: ${d.store}" style="font-weight:700;text-align:left;padding-left:12px">${d.store}</td>
      <td data-tooltip="점수합: ${d.score}점 (전체 ${globalRank}위)" class="score-high">${d.score}<br><small style="color:#94a3b8;font-size:0.7rem">전체${globalRank}위</small></td>
      <td>
        <button class="ai-btn" onclick="showAI('${d.store.replace(/'/g,"\\'")}')">🤖 AI 분석</button>
      </td>
      <td data-tooltip="타사단골모집 실적: ${d.dangol_real}건 | 환산: ${d.dangol_score}점 | 전월대비: ${d.prev_dangol}">
        <span class="${prevClass(d.prev_dangol)}">${d.dangol_real}</span>
        <br><small style="color:#94a3b8">${d.prev_dangol}</small>
      </td>
      <td data-tooltip="010 실적: ${d.o10_real}건 | 환산: ${d.o10_score}점 | 전월대비: ${d.prev_010}">
        <span class="${prevClass(d.prev_010)}">${d.o10_real}</span>
        <br><small style="color:#94a3b8">${d.prev_010}</small>
      </td>
      <td data-tooltip="MNP 실적: ${d.mnp_real}건 | 환산: ${d.mnp_score}점 | 전월대비: ${d.prev_mnp}">
        <span class="${prevClass(d.prev_mnp)}">${d.mnp_real}</span>
        <br><small style="color:#94a3b8">${d.prev_mnp}</small>
      </td>
      <td data-tooltip="MVNO 실적: ${d.mvno_real}건 | 환산: ${d.mvno_score}점 | 전월대비: ${d.prev_mvno}">
        <span class="${prevClass(d.prev_mvno)}">${d.mvno_real}</span>
        <br><small style="color:#94a3b8">${d.prev_mvno}</small>
      </td>
      <td data-tooltip="초고속 실적: ${d.speed_real}건 | 환산: ${d.speed_score}점 | 전월대비: ${d.prev_speed}">
        <span class="${prevClass(d.prev_speed)}">${d.speed_real}</span>
        <br><small style="color:#94a3b8">${d.prev_speed}</small>
      </td>
      <td data-tooltip="IPTV 실적: ${d.iptv_real}건 | 환산: ${d.iptv_score}점 | 전월대비: ${d.prev_iptv}">
        <span class="${prevClass(d.prev_iptv)}">${d.iptv_real}</span>
        <br><small style="color:#94a3b8">${d.prev_iptv}</small>
      </td>
      <td data-tooltip="당월 매장실적 소계: ${d.store_sub}점" style="font-weight:700;color:#1d4ed8">${d.store_sub}</td>
      <td data-tooltip="팀활동 20점 (S26 AI 컨테스트 참여)">${teamCell(d.team20,'S26 AI 컨테스트')}</td>
      <td data-tooltip="팀활동 30점 (유심교체 도움 VMD 부착)">${teamCell(d.team30,'유심교체 VMD')}</td>
      <td data-tooltip="당월 팀활동 소계: ${d.team_sub}점" style="font-weight:700">${d.team_sub}</td>
    </tr>`;
  }).join('');

  const panelId = 'panel-' + ag;
  document.getElementById(panelId).innerHTML = `
    <div class="section-title" style="border-left-color:${col.bg};color:${col.bg}">
      🏪 ${ag} 대리점 매장별 실적 (${stores.length}개 매장)
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr style="background:${col.bg}">
            <th>매장</th><th>점수합</th><th>AI 코멘트</th>
            <th>타사단골모집</th><th>010</th><th>MNP</th><th>MVNO</th><th>초고속</th><th>IPTV</th>
            <th>매장실적소계</th><th>팀활동20점</th><th>팀활동30점</th><th>팀활동소계</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

/* ─── AI 모달 표시 ─── */
function showAI(storeName) {
  const store = RAW_DATA.find(d => d.store === storeName);
  if (!store) return;
  document.getElementById('ai-modal-title').textContent = `🤖 AI 실적 분석 — ${storeName}`;
  document.getElementById('ai-modal-body').innerHTML = generateAIComment(store);
  document.getElementById('ai-modal-overlay').classList.add('show');
}
function closeModal() {
  document.getElementById('ai-modal-overlay').classList.remove('show');
}
document.getElementById('ai-modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* ─── 탭 전환 ─── */
function switchTab(key) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

  const panelId = key === 'all' ? 'panel-all' : 'panel-' + key;
  const panel = document.getElementById(panelId);
  if (panel) panel.classList.add('active');

  const btns = document.querySelectorAll('.tab-btn');
  btns.forEach(b => {
    const label = b.textContent.replace(/[📊🏪]/g,'').trim();
    if ((key === 'all' && label === '종합현황') || label === key) b.classList.add('active');
  });
}

/* ─── 초기 렌더링 ─── */
(function init() {
  renderTopCards();
  renderAll();
  AGENCIES.forEach(ag => renderAgency(ag));
})();
</script>
