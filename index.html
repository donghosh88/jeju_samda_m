<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>삼다컨테스트 매장별 실적 대시보드</title>
<style>
*,*::before,*::after{box-sizing:border-box !important;}
:root{
  --primary:#003087;--primary-light:#0055b3;--primary-dark:#001a5c;
  --accent:#E8001D;--bg:#eef2f7;--card:#fff;
  --text:#1a1a2e;--muted:#5a6a8a;--border:#dde3ee;
  --shadow:0 4px 20px rgba(0,48,135,.10);
  --radius:14px;
  --c-JS:#1565C0;--c-서귀포:#2E7D32;--c-스마일:#F57F17;
  --c-앤유:#6A1B9A;--c-오름:#00838F;--c-제주:#C62828;
  --c-제주ET:#4527A0;--c-제주광양:#558B2F;
  --c-제주굿모닝:#E65100;--c-제주정다운:#00695C;--c-제주중앙:#283593;
}
html,body{margin:0;padding:0;background:var(--bg);font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;color:var(--text);min-width:320px;}
body{padding-bottom:60px;}
::selection{background:transparent;}

/* ── 헤더 ── */
.hdr{
  background:linear-gradient(135deg,#001a5c 0%,#003087 50%,#0055b3 100%);
  color:#fff;text-align:center;padding:28px 20px 18px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 4px 24px rgba(0,26,92,.35);
}
.hdr-title{font-size:clamp(22px,4vw,40px);font-weight:900;letter-spacing:-1px;margin:0;text-shadow:0 2px 10px rgba(0,0,0,.25);}
.hdr-date{font-size:10px;font-weight:700;margin-top:6px;opacity:.8;letter-spacing:1.5px;}

/* ── 왕관 섹션 ── */
.crown-wrap{padding:22px 20px 6px;}
.section-label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}
.crown-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;}
.crown-card{
  background:var(--card);border-radius:var(--radius);padding:16px 14px 13px;
  box-shadow:var(--shadow);border-left:5px solid #ccc;
  transition:transform .18s,box-shadow .18s;cursor:default;min-width:150px;
}
.crown-card:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(0,0,0,.14);}
.crown-ag{font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.crown-store{font-size:18px;font-weight:900;line-height:1.25;margin-bottom:5px;}
.crown-score{font-size:13px;color:var(--muted);}
.crown-icon{font-size:20px;}

/* ── 탭 바 ── */
.tab-bar{
  display:flex;flex-wrap:wrap;gap:5px;
  padding:14px 20px 0;
  position:sticky;top:96px;z-index:150;
  background:var(--bg);border-bottom:2px solid var(--border);
}
.tab-btn{
  padding:7px 14px;border-radius:8px 8px 0 0;border:none;cursor:pointer;
  font-size:12px;font-weight:700;background:#dde3ee;color:var(--muted);
  transition:background .15s,color .15s;white-space:nowrap;
}
.tab-btn.active{background:var(--primary);color:#fff;}
.tab-btn:hover:not(.active){background:#c5cfe0;}

/* ── 탭 콘텐츠 ── */
.tab-pane{display:none;padding:20px;}
.tab-pane.active{display:block;}
.pane-title{font-size:15px;font-weight:800;margin-bottom:14px;}

/* ── 테이블 ── */
.tbl-wrap{overflow-x:auto;overflow-y:auto;border-radius:var(--radius);box-shadow:var(--shadow);background:var(--card);}
table{width:100%;border-collapse:collapse;min-width:860px;font-size:12.5px;}
thead th{
  background:var(--primary);color:#fff;
  padding:10px 9px;text-align:center;font-weight:700;font-size:11.5px;
  position:sticky;top:0;z-index:10;white-space:nowrap;
}
thead th.th-store{text-align:left;min-width:130px;}
tbody tr{border-bottom:1px solid #eef0f6;transition:background .1s;}
tbody tr:hover{background:#e8f0ff !important;}
tbody tr:nth-child(even){background:#f7f9fd;}
tbody tr.row-top1{background:#fffde7 !important;}
tbody tr.row-top1:hover{background:#fff9c4 !important;}
tbody td{padding:8px 9px;text-align:center;white-space:nowrap;vertical-align:middle;}
td.td-store{text-align:left;font-weight:700;}
td.td-score{font-weight:800;color:var(--primary);}

/* 순위 뱃지 */
.rbadge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:12px;font-weight:800;}
.rb1{background:#FFD700;color:#7a5800;}
.rb2{background:#C0C0C0;color:#444;}
.rb3{background:#CD7F32;color:#fff;}
.rbn{background:#e8eaf6;color:#555;}

/* 전월대비 */
.up{color:#c62828;font-weight:700;}
.sp{color:#e65100;font-weight:700;font-size:10.5px;line-height:1.3;}

/* AI 버튼 */
.ai-btn{
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:#fff;border:none;border-radius:6px;padding:4px 9px;
  font-size:10.5px;font-weight:700;cursor:pointer;white-space:nowrap;
  transition:opacity .15s;
}
.ai-btn:hover{opacity:.82;}
.ai-top-label{font-size:10px;color:#bbb;}

/* 툴팁 */
[data-tip]{position:relative;cursor:help;}
[data-tip]:hover::after{
  content:attr(data-tip);
  position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);
  background:#1a1a2e;color:#fff;font-size:10.5px;padding:5px 9px;
  border-radius:6px;white-space:nowrap;z-index:9999;
  pointer-events:none;box-shadow:0 2px 10px rgba(0,0,0,.2);
}

/* AI 모달 */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.48);z-index:9999;
  align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal-box{
  background:#fff;border-radius:18px;padding:28px 26px 22px;
  max-width:540px;width:94%;box-shadow:0 16px 56px rgba(0,0,0,.24);
  position:relative;max-height:82vh;overflow-y:auto;
}
.modal-box h3{margin:0 0 14px;font-size:16px;color:var(--primary);line-height:1.4;}
.modal-body{font-size:12.5px;line-height:1.85;color:#333;}
.modal-close{
  position:absolute;top:14px;right:16px;
  background:none;border:none;font-size:22px;cursor:pointer;color:#999;
}
.modal-close:hover{color:#333;}

/* 점수바 */
.score-bar-wrap{display:flex;align-items:center;gap:8px;}
.score-bar{height:7px;border-radius:4px;background:#e0e7ff;flex:1;min-width:60px;overflow:hidden;}
.score-bar-fill{height:100%;border-radius:4px;background:var(--primary);transition:width .4s;}

/* 반응형 */
@media(max-width:768px){
  .hdr-title{font-size:20px;}
  .tab-bar{top:76px;}
  .crown-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));}
  .crown-store{font-size:15px;}
  table{font-size:11px;}
  thead th,tbody td{padding:6px 6px;}
}
@media(max-width:480px){
  .tab-btn{font-size:10px;padding:5px 9px;}
  .hdr-title{font-size:16px;}
}
</style>
</head>

/* ── 대리점 설정 ── */
const AG_CFG = {
  "JS":        {color:"#1565C0",bg:"#e3f0ff"},
  "서귀포":    {color:"#2E7D32",bg:"#e8f5e9"},
  "스마일":    {color:"#F57F17",bg:"#fff8e1"},

  "오름":      {color:"#00838F",bg:"#e0f7fa"},
  "제주":      {color:"#C62828",bg:"#ffebee"},
  "제주E&T":   {color:"#4527A0",bg:"#ede7f6"},
  "제주광양":  {color:"#558B2F",bg:"#f1f8e9"},
  "제주굿모닝":{color:"#E65100",bg:"#fff3e0"},
  "제주정다운":{color:"#00695C",bg:"#e0f2f1"},
  "제주중앙":  {color:"#283593",bg:"#e8eaf6"}
};
const AG_LIST = Object.keys(AG_CFG);

/* ── 유틸 ── */
function getColor(ag){return (AG_CFG[ag]||{color:"#555"}).color;}
function getBg(ag){return (AG_CFG[ag]||{bg:"#f5f5f5"}).bg;}

function rbadge(r){
  const cls=r===1?'rb1':r===2?'rb2':r===3?'rb3':'rbn';
  return `<span class="rbadge ${cls}">${r}</span>`;
}

function rateHtml(v){
  if(!v||v==='')return '<span style="color:#bbb">-</span>';
  if(v==='당월無')return `<span class="sp">당월無</span>`;
  if(v==='전월無당월有')return `<span class="sp">전월無<br>당월有</span>`;
  return `<span class="up">${v}</span>`;
}

function scoreBar(score,max=100){
  const pct=Math.min(100,Math.round(score/max*100));
  return `<div class="score-bar-wrap">
    <span style="font-weight:800;color:var(--primary);min-width:38px">${score}</span>
    <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%"></div></div>
  </div>`;
}

/* ── 왕관 카드 ── */
function buildCrown(){
  const grid=document.getElementById('crownGrid');
  grid.innerHTML='';
  AG_LIST.forEach(ag=>{
    const stores=DATA.filter(d=>d.ag===ag).sort((a,b)=>b.score-a.score);
    if(!stores.length)return;
    const top=stores[0];
    const c=getColor(ag),bg=getBg(ag);
    grid.innerHTML+=`
      <div class="crown-card" style="border-left-color:${c};background:${bg}">
        <div class="crown-ag" style="color:${c}">${ag}<span class="crown-icon">👑</span></div>
        <div class="crown-store" style="color:${c}">${top.st}</div>
        <div class="crown-score">점수합 <strong>${top.score}</strong>점</div>
      </div>`;
  });
}

/* ── 탭 생성 ── */
function buildTabs(){
  const bar=document.getElementById('tabBar');
  const cont=document.getElementById('tabContents');
  bar.innerHTML=''; cont.innerHTML='';
  const tabs=['종합현황',...AG_LIST];
  tabs.forEach((t,i)=>{
    const btn=document.createElement('button');
    btn.className='tab-btn'+(i===0?' active':'');
    btn.textContent=t; btn.onclick=()=>switchTab(t);
    bar.appendChild(btn);
    const div=document.createElement('div');
    div.className='tab-pane'+(i===0?' active':'');
    div.id='pane_'+t; cont.appendChild(div);
  });
  renderOverview();
  AG_LIST.forEach(ag=>renderAgency(ag));
}

function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.textContent===name));
  document.querySelectorAll('.tab-pane').forEach(d=>d.classList.toggle('active',d.id==='pane_'+name));
}

/* ── 종합현황 ── */
function renderOverview(){
  const sorted=[...DATA].sort((a,b)=>a.rank-b.rank);
  let rows='';
  sorted.forEach(d=>{
    const c=getColor(d.ag);
    rows+=`<tr>
      <td style="font-weight:800;color:${c};text-align:left">${d.ag}</td>
      <td>${rbadge(d.rank)}</td>
      <td data-tip="점수합: ${d.score}점 (매장실적${d.소계}+팀활동${d.팀합})">${scoreBar(d.score)}</td>
      <td data-tip="타사단골모집 실적: ${d.단골실}건 | 전월대비: ${d.r단골}">${d.단골실}</td>
      <td data-tip="010 실적: ${d.s010실}건 | 전월대비: ${d.r010}">${d.s010실}</td>

/* ── 대리점별 탭 ── */
function renderAgency(ag){
  const stores=[...DATA.filter(d=>d.ag===ag)].sort((a,b)=>b.score-a.score);
  const c=getColor(ag), bg=getBg(ag);
  const allSorted=[...DATA].sort((a,b)=>b.score-a.score);
  const maxScore=allSorted[0].score;

  let rows='';
  stores.forEach(d=>{
    const myGlobalRank=allSorted.findIndex(r=>r.st===d.st)+1;
    const isTop1=(myGlobalRank===1);
    const aiCell=isTop1
      ?`<td><span class="ai-top-label">🥇 전체 1위</span></td>`
      :`<td><button class="ai-btn" onclick="showAI('${d.st.replace(/'/g,"\\'")}')">🤖 AI 분석</button></td>`;

    rows+=`<tr class="${isTop1?'row-top1':''}">
      <td class="td-store" data-tip="${d.st} | 전체 ${myGlobalRank}위" style="color:${c}">${d.st}</td>
      <td data-tip="점수합: ${d.score}점">${scoreBar(d.score,maxScore)}</td>
      ${aiCell}
      <td data-tip="타사단골모집 실적: ${d.단골실}건 | 환산점수: ${d.단골점}점 | 전월대비: ${d.r단골}">${d.단골실}</td>
      <td data-tip="010 실적: ${d.s010실}건 | 환산점수: ${d.s010점}점 | 전월대비: ${d.r010}">${d.s010실}</td>
      <td data-tip="MNP 실적: ${d.MNP실}건 | 환산점수: ${d.MNP점}점 | 전월대비: ${d.rMNP}">${d.MNP실}</td>
      <td data-tip="MVNO 실적: ${d.MVNO실}건 | 환산점수: ${d.MVNO점}점 | 전월대비: ${d.rMVNO}">${d.MVNO실}</td>
      <td data-tip="초고속 실적: ${d.초실}건 | 환산점수: ${d.초점}점 | 전월대비: ${d.r초}">${d.초실}</td>
      <td data-tip="IPTV 실적: ${d.IPTV실}건 | 환산점수: ${d.IPTV점}점 | 전월대비: ${d.rIPTV}">${d.IPTV실}</td>
      <td data-tip="매장실적 소계: ${d.소계}점">${d.소계}</td>
      <td data-tip="팀활동 S26 AI 컨테스트 20점: ${d.팀20}점">${d.팀20}</td>
      <td data-tip="팀활동 유심교체 VMD 30점: ${d.팀30}점">${d.팀30}</td>
      <td data-tip="팀활동 소계: ${d.팀합}점">${d.팀합}</td>
    </tr>`;
  });

  document.getElementById('pane_'+ag).innerHTML=`
    <div class="pane-title" style="color:${c}">🏪 ${ag} 대리점 매장별 실적</div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th class="th-store">매장</th><th style="min-width:160px">점수합</th><th>AI 코멘트</th>
        <th>타사단골모집</th><th>010</th><th>MNP</th><th>MVNO</th>
        <th>초고속</th><th>IPTV</th>
        <th>매장실적 소계</th><th>팀활동 20점</th><th>팀활동 30점</th><th>팀활동 소계</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

/* ── AI 코멘트 ── */
function showAI(storeName){
  const d=DATA.find(r=>r.st===storeName);
  if(!d)return;

  const allSorted=[...DATA].sort((a,b)=>b.score-a.score);
  const myIdx=allSorted.findIndex(r=>r.st===storeName);
  const myGlobalRank=myIdx+1;
  const top1=allSorted[0];
  const nearAbove=myIdx>0?allSorted[myIdx-1]:null;
  const rank10Score=allSorted[9]?.score||0;
  const rank5Score=allSorted[4]?.score||0;
  const rank20Score=allSorted[19]?.score||0;

  /* 항목별 분석 */
  const items=[
    {name:'타사단골모집', 실:d.단골실, 점:d.단골점, 배율:1, tip:'1건당 1점'},
    {name:'010',          실:d.s010실,  점:d.s010점,  배율:1, tip:'1건당 1점'},
    {name:'MNP',          실:d.MNP실,   점:d.MNP점,   배율:2, tip:'1건당 2점'},
    {name:'MVNO',         실:d.MVNO실,  점:d.MVNO점,  배율:3, tip:'1건당 3점'},
    {name:'초고속',       실:d.초실,    점:d.초점,    배율:3, tip:'1건당 3점'},
    {name:'IPTV',         실:d.IPTV실,  점:d.IPTV점,  배율:3, tip:'1건당 3점'},
  ];
  const zeroItems=items.filter(i=>i.실===0);
  const lowItems=[...items].filter(i=>i.실>0).sort((a,b)=>a.점-b.점).slice(0,3);

  let html=`<div style="background:#f0f4ff;border-radius:10px;padding:12px 14px;margin-bottom:14px;">
    <div style="font-size:13px;font-weight:800;color:var(--primary);margin-bottom:4px;">📍 현재 위치</div>
    <div>전체 <strong>39개 매장 중 ${myGlobalRank}위</strong> &nbsp;|&nbsp; 점수합 <strong>${d.score}점</strong></div>
    <div style="margin-top:4px;">매장실적 소계 <strong>${d.소계}점</strong> &nbsp;+&nbsp; 팀활동 소계 <strong>${d.팀합}점</strong></div>
  </div>`;

  if(nearAbove){
    const diff=(nearAbove.score-d.score).toFixed(1);
    html+=`<div style="background:#fff8e1;border-radius:10px;padding:11px 14px;margin-bottom:14px;">
      <div style="font-size:12.5px;font-weight:700;color:#e65100;margin-bottom:4px;">📈 바로 위 매장과의 격차</div>
      <div><strong>${nearAbove.st}</strong>(${nearAbove.score}점)까지 <strong style="color:#c62828">${diff}점</strong> 필요</div>
    </div>`;
  }

  /* 목표 진입 분석 */
  const targets=[];
  if(myGlobalRank>5)  targets.push({label:'상위 5위',  score:rank5Score});
  if(myGlobalRank>10) targets.push({label:'상위 10위', score:rank10Score});
  if(myGlobalRank>20) targets.push({label:'상위 20위', score:rank20Score});

  if(targets.length){
    html+=`<div style="background:#e8f5e9;border-radius:10px;padding:11px 14px;margin-bottom:14px;">
      <div style="font-size:12.5px;font-weight:700;color:#2e7d32;margin-bottom:6px;">🏆 목표 진입 분석</div>`;
    targets.forEach(t=>{
      const need=(t.score-d.score+0.5).toFixed(1);
      if(need>0){
        html+=`<div>• <strong>${t.label}</strong>(기준 ${t.score}점) 진입까지 <strong style="color:#c62828">+${need}점</strong> 필요</div>`;
      }
    });
    html+=`</div>`;
  }

  /* 0건 항목 */
  if(zeroItems.length){
    html+=`<div style="background:#ffebee;border-radius:10px;padding:11px 14px;margin-bottom:14px;">
      <div style="font-size:12.5px;font-weight:700;color:#c62828;margin-bottom:6px;">🔴 미실적 항목 (즉시 개선 가능)</div>`;
    zeroItems.forEach(i=>{
      html+=`<div>• <strong>${i.name}</strong>(현재 0건) → 1건 달성 시 <strong>+${i.배율}점</strong> 즉시 획득 <span style="color:#888;font-size:11px">(${i.tip})</span></div>`;
    });
    html+=`</div>`;
  }

  /* 강화 추천 */
  if(lowItems.length){
    html+=`<div style="background:#fff3e0;border-radius:10px;padding:11px 14px;margin-bottom:14px;">
      <div style="font-size:12.5px;font-weight:700;color:#e65100;margin-bottom:6px;">🟡 강화 추천 항목</div>`;
    lowItems.forEach(i=>{
      html+=`<div>• <strong>${i.name}</strong>(현재 ${i.실}건/${i.점}점) → 1건 추가 시 <strong>+${i.배율}점</strong></div>`;
    });
    html+=`</div>`;
  }

  /* 팀활동 미달 */
  if(d.팀20===0||d.팀30===0){
    html+=`<div style="background:#ede7f6;border-radius:10px;padding:11px 14px;margin-bottom:14px;">
      <div style="font-size:12.5px;font-weight:700;color:#6a1b9a;margin-bottom:6px;">🟣 팀활동 미달</div>`;
    if(d.팀20===0) html+=`<div>• <strong>S26 AI 컨테스트 참여</strong> 미완료 → 참여 시 <strong>+20점</strong></div>`;
    if(d.팀30===0) html+=`<div>• <strong>유심교체 도움 VMD 부착</strong> 미완료 → 완료 시 <strong>+30점</strong></div>`;
    html+=`</div>`;
  }

  /* 종합 전략 */
  const maxGain=zeroItems.reduce((s,i)=>s+i.배율,0)+(d.팀20===0?20:0)+(d.팀30===0?30:0);
  if(maxGain>0){
    html+=`<div style="background:#e3f0ff;border-radius:10px;padding:11px 14px;">
      <div style="font-size:12.5px;font-weight:700;color:#1565c0;margin-bottom:4px;">💡 최대 획득 가능 추가 점수</div>
      <div>미실적 항목 전환 + 팀활동 완료 시 최대 <strong style="color:#c62828;font-size:14px">+${maxGain}점</strong> 추가 가능</div>
      <div style="margin-top:4px;color:#555;">예상 점수합: <strong>${(d.score+maxGain).toFixed(1)}점</strong> → 예상 순위 상승 가능</div>
    </div>`;
  }

  document.getElementById('aiTitle').innerHTML=`🤖 AI 코멘트 — ${storeName}`;
  document.getElementById('aiBody').innerHTML=html;
  document.getElementById('aiModal').classList.add('open');
}

function closeAI(){document.getElementById('aiModal').classList.remove('open');}
document.getElementById('aiModal').addEventListener('click',function(e){if(e.target===this)closeAI();});

/* ── 초기화 ── */
buildCrown();
buildTabs();
</script>
</body>
</html>
