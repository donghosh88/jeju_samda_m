<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>삼다컨테스트 매장별 실적 대시보드</title>
<style>
  *, *::before, *::after { box-sizing: border-box !important; margin: 0; padding: 0; }
  :root {
    --color-js: #6366f1;
    --color-seoguipo: #ec4899;
    --color-smile: #f59e0b;
    --color-anyu: #8b5cf6;
    --color-oreum: #10b981;
    --color-jeju: #3b82f6;
    --color-jejuet: #ef4444;
    --color-jejugwangyang: #0ea5e9;
    --color-jejugoodmorning: #f97316;
    --color-jejujungdawoon: #14b8a6;
    --color-jejujungang: #84cc16;
    --bg-main: #0f172a;
    --bg-card: #1e293b;
    --bg-card2: #243044;
    --text-main: #f1f5f9;
    --text-sub: #94a3b8;
    --border: #334155;
    --accent: #38bdf8;
    --gold: #fbbf24;
    --silver: #94a3b8;
    --bronze: #cd7f32;
  }
  html, body { width:100%; min-height:100vh; background:var(--bg-main); color:var(--text-main); font-family:'Segoe UI','Noto Sans KR',sans-serif; font-size:14px; }
  body { overflow-x:hidden; }

  /* ===== HEADER ===== */
  #header { text-align:center; padding:32px 16px 8px; background:linear-gradient(135deg,#0f172a 60%,#1e3a5f 100%); border-bottom:2px solid var(--border); position:sticky; top:0; z-index:100; }
  #header h1 { font-size:40px; font-weight:900; background:linear-gradient(90deg,#38bdf8,#818cf8,#f472b6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:-1px; }
  #header .date-label { font-size:10px; font-weight:700; color:var(--accent); margin-top:4px; letter-spacing:2px; }

  /* ===== TOP CARDS ===== */
  #top-cards { display:flex; flex-wrap:wrap; gap:12px; padding:20px 16px 8px; justify-content:center; }
  .dealer-card { border-radius:14px; padding:14px 18px; min-width:160px; max-width:200px; flex:1 1 160px; box-shadow:0 4px 24px rgba(0,0,0,0.4); border:1.5px solid rgba(255,255,255,0.08); position:relative; overflow:hidden; transition:transform .2s,box-shadow .2s; cursor:default; }
  .dealer-card:hover { transform:translateY(-4px) scale(1.03); box-shadow:0 8px 32px rgba(0,0,0,0.6); }
  .dealer-card .crown { position:absolute; top:8px; right:10px; font-size:22px; }
  .dealer-card .d-name { font-size:15px; font-weight:900; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .dealer-card .d-store { font-size:11px; color:rgba(255,255,255,0.7); margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .dealer-card .d-score { font-size:20px; font-weight:400; color:#fff; }
  .dealer-card .d-score span { font-size:12px; opacity:.7; }
  .dealer-card .d-rank { font-size:11px; margin-top:4px; opacity:.8; }

  /* ===== TABS ===== */
  #tab-bar { display:flex; flex-wrap:wrap; gap:6px; padding:16px 16px 0; position:sticky; top:90px; z-index:90; background:var(--bg-main); border-bottom:2px solid var(--border); padding-bottom:0; }
  .tab-btn { padding:8px 14px; border-radius:8px 8px 0 0; border:1.5px solid var(--border); border-bottom:none; background:var(--bg-card2); color:var(--text-sub); font-size:13px; font-weight:600; cursor:pointer; transition:background .15s,color .15s; white-space:nowrap; }
  .tab-btn.active { background:var(--accent); color:#0f172a; border-color:var(--accent); }
  .tab-btn:hover:not(.active) { background:#1e3a5f; color:var(--text-main); }

  /* ===== TABLE AREA ===== */
  #tab-content { padding:0 16px 32px; overflow-x:auto; overflow-y:auto; min-height:300px; }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  /* ===== TABLE ===== */
  .data-table-wrap { overflow-x:auto; overflow-y:auto; max-height:70vh; border-radius:10px; border:1.5px solid var(--border); margin-top:12px; }
  table { width:100%; border-collapse:collapse; min-width:900px; }
  thead tr { background:linear-gradient(90deg,#1e3a5f,#1e293b); position:sticky; top:0; z-index:10; }
  thead th { padding:10px 8px; font-size:12px; font-weight:700; color:var(--accent); text-align:center; border-bottom:2px solid var(--border); white-space:nowrap; }
  tbody tr { border-bottom:1px solid var(--border); transition:background .12s; }
  tbody tr:hover { background:rgba(56,189,248,0.07); }
  tbody td { padding:8px 8px; font-size:12px; text-align:center; white-space:nowrap; cursor:default; }
  tbody td:first-child { text-align:left; font-weight:600; }
  .rank-1 { background:rgba(251,191,36,0.10); }
  .rank-2 { background:rgba(148,163,184,0.07); }
  .rank-3 { background:rgba(205,127,50,0.07); }
  .rank-badge { display:inline-block; width:24px; height:24px; border-radius:50%; font-size:11px; font-weight:800; line-height:24px; text-align:center; }
  .rank-badge.r1 { background:var(--gold); color:#0f172a; }
  .rank-badge.r2 { background:var(--silver); color:#0f172a; }
  .rank-badge.r3 { background:var(--bronze); color:#fff; }
  .rank-badge.rn { background:var(--bg-card2); color:var(--text-sub); }
  .score-high { color:#34d399; font-weight:700; }
  .score-mid { color:#fbbf24; font-weight:600; }
  .score-low { color:#f87171; }
  .dealer-tag { display:inline-block; padding:2px 7px; border-radius:20px; font-size:10px; font-weight:700; color:#fff; }

  /* AI Comment */
  .ai-btn { padding:4px 10px; border-radius:6px; border:1.5px solid var(--accent); background:transparent; color:var(--accent); font-size:11px; font-weight:700; cursor:pointer; transition:background .15s,color .15s; white-space:nowrap; }
  .ai-btn:hover { background:var(--accent); color:#0f172a; }
  .ai-comment-row td { background:rgba(56,189,248,0.06); text-align:left; padding:10px 16px; font-size:12px; color:#bae6fd; line-height:1.7; border-bottom:2px solid var(--accent); }

  /* Tooltip */
  [data-tooltip] { position:relative; }
  [data-tooltip]:hover::after { content:attr(data-tooltip); position:absolute; bottom:110%; left:50%; transform:translateX(-50%); background:#1e293b; color:#f1f5f9; border:1px solid var(--accent); border-radius:6px; padding:5px 10px; font-size:11px; white-space:pre; z-index:999; pointer-events:none; min-width:120px; box-shadow:0 4px 16px rgba(0,0,0,0.5); }

  /* Trend badges */
  .trend-up { color:#34d399; font-size:11px; }
  .trend-none { color:#f87171; font-size:11px; }
  .trend-new { color:#fbbf24; font-size:11px; }

  /* Responsive */
  @media(max-width:768px) {
    #header h1 { font-size:24px; }
    .dealer-card { min-width:130px; }
    .tab-btn { font-size:11px; padding:6px 9px; }
    tbody td, thead th { font-size:11px; padding:6px 5px; }
  }
  @media(max-width:480px) {
    #header h1 { font-size:18px; }
    #top-cards { gap:8px; }
    .dealer-card { min-width:110px; padding:10px 10px; }
    .d-name { font-size:12px !important; }
    .d-score { font-size:16px !important; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--bg-main); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--accent); }

  /* Loading overlay */
  #loading { position:fixed; inset:0; background:#0f172a; display:flex; align-items:center; justify-content:center; z-index:9999; flex-direction:column; gap:16px; }
  #loading .spinner { width:48px; height:48px; border:4px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #loading p { color:var(--accent); font-size:14px; font-weight:600; }
</style>
</head>

</div>

// ===== 유틸 =====
function getRankBadge(r) {
  if(r===1) return `<span class="rank-badge r1">1</span>`;
  if(r===2) return `<span class="rank-badge r2">2</span>`;
  if(r===3) return `<span class="rank-badge r3">3</span>`;
  return `<span class="rank-badge rn">${r}</span>`;
}
function getScoreClass(s) {
  if(s>=10) return 'score-high';
  if(s>=3) return 'score-mid';
  return 'score-low';
}
function getTrendBadge(v) {
  if(!v || v==='') return '<span style="color:#475569">-</span>';
  if(v==='당월無') return `<span class="trend-none" title="당월 실적 없음">당월無</span>`;
  if(v==='전월無당월有') return `<span class="trend-new" title="전월 없음, 당월 신규">전월無당월有</span>`;
  if(v.startsWith('▲')) return `<span class="trend-up">${v}</span>`;
  return `<span style="color:#94a3b8">${v}</span>`;
}

// ===== 대리점별 1위 매장 계산 =====
function getTopByDealer() {
  const map = {};
  _d.forEach(row => {
    const d = row.대리점;
    if(!map[d] || row.점수합 > map[d].점수합) map[d] = row;
  });
  return map;
}

// ===== 전체 순위 (점수합 기준) =====
function getAllRanked() {
  return [..._d].sort((a,b) => b.점수합 - a.점수합);
}

// ===== AI 코멘트 생성 =====
function generateAIComment(row) {
  const allSorted = getAllRanked();
  const myScore = row.점수합;
  const myRank = allSorted.findIndex(r => r.매장 === row.매장) + 1;
  const total = allSorted.length;

  if(myRank === 1) {
    return `🏆 현재 전체 1위입니다! 지금의 실적을 유지하면서 팀활동 점수를 추가로 확보하면 격차를 더 벌릴 수 있습니다.`;
  }

  const above = allSorted[myRank - 2]; // 바로 위 순위
  const top1 = allSorted[0];
  const top10 = allSorted[9] || allSorted[allSorted.length-1];

  const diffToAbove = above ? (above.점수합 - myScore).toFixed(1) : 0;
  const diffToTop1 = (top1.점수합 - myScore).toFixed(1);
  const diffToTop10 = myRank > 10 ? (top10.점수합 - myScore).toFixed(1) : null;

  let comment = `📊 현재 전체 ${myRank}위 (점수합: ${myScore}점)\n`;

  if(above) {
    comment += `▶ 바로 위 ${myRank-1}위 [${above.매장}](${above.점수합}점)까지 ${diffToAbove}점 차이입니다.\n`;
  }
  comment += `▶ 1위 [${top1.매장}](${top1.점수합}점)까지 ${diffToTop1}점 차이입니다.\n`;

  if(diffToTop10 !== null) {
    comment += `▶ TOP 10 진입을 위해 ${diffToTop10}점 추가 필요합니다.\n`;
  }

  // 부족한 항목 분석
  const weakItems = [];
  if(row.MNP실적 === 0) weakItems.push('MNP(건당 2점)');
  if(row["010실적"] === 0) weakItems.push('010(건당 1점)');
  if(row.MVNO실적 === 0) weakItems.push('MVNO(건당 3점)');
  if(row.초고속실적 === 0) weakItems.push('초고속(건당 3점)');
  if(row.IPTV실적 === 0) weakItems.push('IPTV(건당 3점)');
  if(row.타사단골실적 === 0) weakItems.push('타사단골모집(건당 1점)');

  if(weakItems.length > 0) {
    comment += `💡 현재 실적 0인 항목: ${weakItems.join(', ')}\n`;
  }

  // 구체적 목표 제시
  const needed = parseFloat(diffToAbove) || 0;
  if(needed > 0) {
    const mnpNeeded = Math.ceil(needed / 2);
    const mvnoNeeded = Math.ceil(needed / 3);
    comment += `🎯 순위 상승 방법 예시:\n`;
    comment += `   • MNP ${mnpNeeded}건 추가 → +${mnpNeeded*2}점\n`;
    comment += `   • MVNO/초고속/IPTV ${mvnoNeeded}건 추가 → +${mvnoNeeded*3}점\n`;
    comment += `   • 팀활동(20점+30점) 참여 시 최대 +50점 추가 가능`;
  }

  return comment;
}

function toggleAIComment(commentId, storeName, idx, dealer) {
  const row = document.getElementById(commentId);
  const textDiv = document.getElementById(commentId + '-text');
  if(!row) return;
  if(row.style.display === 'none') {
    const storeData = _d.find(r => r.매장 === storeName);
    if(storeData) {
      textDiv.textContent = generateAIComment(storeData);
    }
    row.style.display = 'table-row';
  } else {
    row.style.display = 'none';
  }
}

// ===== 탭 시스템 =====
let currentTab = 'overall';

function renderTabs() {
  const tabBar = document.getElementById('tab-bar');
  const tabs = [
    {id:'overall', label:'📊 종합현황'},
    ...DEALER_ORDER.map(d => ({id:'dealer-'+d, label:d}))
  ];
  tabBar.innerHTML = tabs.map(t =>
    `<button class="tab-btn${t.id===currentTab?' active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function switchTab(tabId) {
  currentTab = tabId;
  renderTabs();
  renderTabContent();
}

function renderTabContent() {
  const content = document.getElementById('tab-content');
  let html = '';
  if(currentTab === 'overall') {
    html = `<div class="tab-panel active">${renderOverallTab()}</div>`;
  } else {
    const dealer = currentTab.replace('dealer-','');
    html = `<div class="tab-panel active">${renderDealerTab(dealer)}</div>`;
  }
  content.innerHTML = html;
}

// ===== 초기화 =====
function init() {
  renderTopCards();
  renderTabs();
  renderTabContent();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

window.addEventListener('DOMContentLoaded', () => {
  setTimeout(init, 600);
});
</script>
