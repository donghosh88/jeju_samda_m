<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>삼다컨테스트 매장별 실적 대시보드</title>
<style>
  *, *::before, *::after { box-sizing: border-box !important; }
  :root {
    --primary: #003087;
    --primary-light: #0055cc;
    --accent: #e8002d;
    --bg: #f0f4fa;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --text-muted: #6b7280;
    --border: #dde3ef;
    --shadow: 0 4px 20px rgba(0,48,135,0.10);
    --radius: 14px;
    /* 대리점 색상 */
    --c-js: #1565C0;
    --c-seoguipo: #00897B;
    --c-smile: #F57C00;
    --c-anyu: #7B1FA2;
    --c-oreum: #C62828;
    --c-jeju: #2E7D32;
    --c-jejuet: #0277BD;
    --c-jejugwangyang: #4527A0;
    --c-jejugoodmorning: #558B2F;
    --c-jejujungdawoon: #AD1457;
    --c-jejujungang: #00695C;
  }
  html, body { margin:0; padding:0; background:var(--bg); font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif; color:var(--text); min-height:100vh; }
  body { overflow-x:hidden; }

  /* 보안 */
  ::selection { background:transparent; }

  /* 헤더 */
  .dashboard-header {
    background: linear-gradient(135deg, #003087 0%, #0055cc 60%, #1976D2 100%);
    color:#fff;
    text-align:center;
    padding: 32px 20px 24px;
    position:sticky; top:0; z-index:100;
    box-shadow: 0 4px 24px rgba(0,48,135,0.25);
  }
  .dashboard-title {
    font-size:40px; font-weight:900; letter-spacing:-1px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.18);
    margin:0 0 6px;
  }
  .dashboard-date {
    font-size:10px; font-weight:700; color:#b3d4ff;
    letter-spacing:1px; margin:0;
  }

  /* 왕관 카드 섹션 */
  .crown-section {
    padding: 28px 20px 10px;
    max-width:1600px; margin:0 auto;
  }
  .crown-section-title {
    font-size:1.1rem; font-weight:700; color:var(--primary);
    margin-bottom:16px; letter-spacing:0.5px;
    display:flex; align-items:center; gap:8px;
  }
  .crown-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap:14px;
  }
  .crown-card {
    background:var(--card-bg);
    border-radius:var(--radius);
    padding:18px 16px 14px;
    box-shadow:var(--shadow);
    border-top:5px solid var(--c-color);
    min-width:160px; min-height:110px;
    transition: transform 0.18s, box-shadow 0.18s;
    cursor:default;
    position:relative;
    overflow:hidden;
  }
  .crown-card::before {
    content:'';
    position:absolute; top:0; left:0; right:0; bottom:0;
    background: linear-gradient(135deg, rgba(255,255,255,0) 60%, rgba(255,255,255,0.08) 100%);
    pointer-events:none;
  }
  .crown-card:hover { transform:translateY(-4px); box-shadow:0 8px 32px rgba(0,48,135,0.18); }
  .crown-card-dealer {
    font-size:13px; font-weight:700; color:var(--c-color);
    margin-bottom:4px; display:flex; align-items:center; gap:4px;
  }
  .crown-card-store {
    font-size:30px; font-weight:900; color:var(--text);
    line-height:1.1; margin-bottom:6px;
    word-break:keep-all;
  }
  .crown-card-score {
    font-size:20px; font-weight:400; color:var(--text-muted);
  }
  .crown-icon { font-size:18px; }

  /* 탭 */
  .tab-container {
    max-width:1600px; margin:24px auto 0;
    padding:0 20px;
    position:sticky; top:108px; z-index:90;
  }
  .tab-bar {
    display:flex; flex-wrap:wrap; gap:6px;
    background:var(--card-bg);
    border-radius:var(--radius);
    padding:10px 12px;
    box-shadow:var(--shadow);
    overflow-x:auto;
  }
  .tab-btn {
    padding:8px 16px; border:none; border-radius:8px;
    font-size:0.85rem; font-weight:700; cursor:pointer;
    background:#f0f4fa; color:var(--text-muted);
    transition:all 0.18s; white-space:nowrap;
    min-height:36px;
  }
  .tab-btn:hover { background:#dde3ef; color:var(--primary); }
  .tab-btn.active { background:var(--primary); color:#fff; box-shadow:0 2px 8px rgba(0,48,135,0.25); }

  /* 콘텐츠 */
  .content-area {
    max-width:1600px; margin:16px auto 40px;
    padding:0 20px;
  }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  /* 테이블 래퍼 */
  .table-wrapper {
    background:var(--card-bg);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    overflow-x:auto; overflow-y:auto;
    max-height:70vh;
    min-height:200px;
  }
  table {
    width:100%; border-collapse:collapse;
    font-size:0.82rem; min-width:900px;
  }
  thead { position:sticky; top:0; z-index:10; }
  thead tr th {
    background: linear-gradient(135deg, #003087, #0055cc);
    color:#fff; font-weight:700;
    padding:12px 10px; text-align:center;
    white-space:nowrap; border-bottom:2px solid #0044aa;
    font-size:0.8rem;
  }
  thead tr th:first-child { border-radius:var(--radius) 0 0 0; }
  thead tr th:last-child { border-radius:0 var(--radius) 0 0; }
  tbody tr { transition:background 0.12s; }
  tbody tr:nth-child(even) { background:#f7f9fd; }
  tbody tr:hover { background:#e8f0fe !important; }
  tbody td {
    padding:10px 10px; text-align:center;
    border-bottom:1px solid var(--border);
    white-space:nowrap; vertical-align:middle;
    cursor:default;
  }
  tbody td:first-child { text-align:left; font-weight:600; }
  .rank-badge {
    display:inline-flex; align-items:center; justify-content:center;
    width:28px; height:28px; border-radius:50%;
    font-weight:800; font-size:0.85rem;
  }
  .rank-1 { background:#FFD700; color:#7a5800; }
  .rank-2 { background:#C0C0C0; color:#444; }
  .rank-3 { background:#CD7F32; color:#fff; }
  .rank-other { background:#e8f0fe; color:var(--primary); }
  .score-high { color:#003087; font-weight:800; }
  .score-mid { color:#0055cc; font-weight:700; }
  .score-low { color:var(--text-muted); }
  .tag-none { color:#ef4444; font-size:0.75rem; font-weight:700; background:#fee2e2; padding:2px 6px; border-radius:4px; }
  .tag-new { color:#16a34a; font-size:0.75rem; font-weight:700; background:#dcfce7; padding:2px 6px; border-radius:4px; }

  /* AI 코멘트 버튼 */
  .ai-btn {
    padding:5px 10px; border:none; border-radius:6px;
    background: linear-gradient(135deg, #003087, #0055cc);
    color:#fff; font-size:0.75rem; font-weight:700;
    cursor:pointer; white-space:nowrap;
    transition:all 0.18s; min-width:70px;
  }
  .ai-btn:hover { background: linear-gradient(135deg, #0044aa, #1976D2); transform:scale(1.05); }

  /* AI 모달 */
  .modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.55); z-index:1000;
    align-items:center; justify-content:center;
    padding:20px;
  }
  .modal-overlay.open { display:flex; }
  .modal-box {
    background:#fff; border-radius:18px;
    padding:28px 28px 24px;
    max-width:560px; width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,0.25);
    position:relative; max-height:80vh; overflow-y:auto;
  }
  .modal-title {
    font-size:1.1rem; font-weight:800; color:var(--primary);
    margin-bottom:14px; display:flex; align-items:center; gap:8px;
  }
  .modal-content { font-size:0.88rem; line-height:1.8; color:var(--text); }
  .modal-content strong { color:var(--primary); }
  .modal-content .highlight { background:#e8f0fe; border-radius:6px; padding:8px 12px; margin:8px 0; }
  .modal-close {
    position:absolute; top:14px; right:16px;
    background:none; border:none; font-size:1.4rem;
    cursor:pointer; color:var(--text-muted);
    line-height:1;
  }
  .modal-close:hover { color:var(--accent); }

  /* 툴팁 */
  [data-tooltip] { position:relative; }
  [data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position:absolute; bottom:calc(100% + 6px); left:50%;
    transform:translateX(-50%);
    background:#1a1a2e; color:#fff;
    padding:5px 10px; border-radius:6px;
    font-size:0.75rem; white-space:nowrap;
    z-index:200; pointer-events:none;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
  }
  [data-tooltip]:hover::before {
    content:'';
    position:absolute; bottom:calc(100% + 1px); left:50%;
    transform:translateX(-50%);
    border:5px solid transparent;
    border-top-color:#1a1a2e;
    z-index:200; pointer-events:none;
  }

  /* 반응형 */
  @media(max-width:768px) {
    .dashboard-title { font-size:26px; }
    .crown-card-store { font-size:20px; }
    .crown-card-score { font-size:15px; }
    .tab-container { top:90px; }
    .tab-btn { font-size:0.75rem; padding:6px 10px; }
    table { font-size:0.75rem; }
    thead tr th { padding:8px 6px; font-size:0.72rem; }
    tbody td { padding:7px 6px; }
    .crown-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  }
  @media(max-width:480px) {
    .dashboard-title { font-size:20px; }
    .crown-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.keyCode === 123 ||

      (e.ctrlKey && e.shiftKey && e.keyCode === 74) ||
      (e.ctrlKey && e.keyCode === 85) ||

});

// ===================== 유틸 =====================
function fmtRatio(v) {
  if (v === "당월無") return `<span class="tag-none">당월無</span>`;
  if (v === "전월無당월有") return `<span class="tag-new">전월無당월有</span>`;
  if (typeof v === 'number') return (v*100).toFixed(1)+'%';
  return v;
}
function scoreClass(s) {
  if (s >= 80) return 'score-high';
  if (s >= 50) return 'score-mid';
  return 'score-low';
}
function rankBadge(r) {
  let cls = r===1?'rank-1':r===2?'rank-2':r===3?'rank-3':'rank-other';
  let icon = r===1?'🥇':r===2?'🥈':r===3?'🥉':'';
  return `<span class="rank-badge ${cls}">${icon||r}</span>`;
}

// ===================== 왕관 카드 =====================
function buildCrownCards() {
  const grid = document.getElementById('crownGrid');
  grid.innerHTML = '';
  DEALER_ORDER.forEach(dealer => {
    const stores = RAW_DATA.filter(d=>d.대리점===dealer).sort((a,b)=>b.점수합-a.점수합);
    if (!stores.length) return;
    const top = stores[0];
    const cfg = DEALER_CONFIG[dealer] || {color:'#003087',bg:'#E3F2FD'};
    const card = document.createElement('div');
    card.className = 'crown-card';
    card.style.setProperty('--c-color', cfg.color);
    card.style.background = cfg.bg;
    card.innerHTML = `
      <div class="crown-card-dealer" style="color:${cfg.color}">
        ${dealer} <span class="crown-icon">👑</span>
      </div>
      <div class="crown-card-store" style="color:${cfg.color}">${top.매장.replace(dealer,'').trim()||top.매장}</div>
      <div class="crown-card-score">점수합: <strong style="color:${cfg.color}">${top.점수합}</strong>점</div>
    `;
    card.setAttribute('data-tooltip', `${top.매장} | 순위: ${top.순위}위 | 점수합: ${top.점수합}점`);
    grid.appendChild(card);
  });
}

// ===================== 탭 생성 =====================
function buildTabs() {
  const tabBar = document.getElementById('tabBar');
  const contentArea = document.getElementById('contentArea');
  tabBar.innerHTML = '';
  contentArea.innerHTML = '';

  const tabs = ['종합현황', ...DEALER_ORDER];
  tabs.forEach((tab, idx) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (idx===0?' active':'');
    btn.textContent = tab;
    btn.onclick = () => switchTab(tab);
    tabBar.appendChild(btn);

    const panel = document.createElement('div');
    panel.className = 'tab-panel' + (idx===0?' active':'');
    panel.id = 'panel-' + tab;
    contentArea.appendChild(panel);
  });

  buildOverviewPanel();
  DEALER_ORDER.forEach(d => buildDealerPanel(d));
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.textContent===tab);
  });
  document.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', p.id==='panel-'+tab);
  });
}

          <tr>
            <th>매장</th><th>점수합</th><th>AI 코멘트</th>
            <th>타사단골모집</th><th>010</th><th>MNP</th><th>MVNO</th>
            <th>초고속</th><th>IPTV</th>
            <th>매장실적소계</th><th>팀활동20점</th><th>팀활동30점</th><th>팀활동소계</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ===================== AI 코멘트 =====================
function showAI(storeName) {
  const store = RAW_DATA.find(d=>d.매장===storeName);
  if (!store) return;

  const allSorted = [...RAW_DATA].sort((a,b)=>b.점수합-a.점수합);
  const myRank = store.순위;
  const myScore = store.점수합;

  // 현재 순위 위 매장들
  const above = allSorted.filter(d=>d.점수합>myScore).slice(-3);
  const nextTarget = above.length>0 ? above[above.length-1] : null;
  const top5 = allSorted[4];
  const top10 = allSorted[9];
  const top20 = allSorted[19];

  // 부족한 항목 분석
  const maxScores = {
    타사단골: Math.max(...RAW_DATA.map(d=>d.타사단골점수)),
    '010': Math.max(...RAW_DATA.map(d=>d.점수010)),
    MNP: Math.max(...RAW_DATA.map(d=>d.MNP점수)),
    MVNO: Math.max(...RAW_DATA.map(d=>d.MVNO점수)),
    초고속: Math.max(...RAW_DATA.map(d=>d.초고속점수)),
    IPTV: Math.max(...RAW_DATA.map(d=>d.IPTV점수))
  };

  const gaps = [
    {name:'타사단골모집', cur:store.타사단골점수, max:maxScores.타사단골, 실적:store.타사단골모집실적},
    {name:'010', cur:store.점수010, max:maxScores['010'], 실적:store.실적010},
    {name:'MNP', cur:store.MNP점수, max:maxScores.MNP, 실적:store.MNP실적},
    {name:'MVNO', cur:store.MVNO점수, max:maxScores.MVNO, 실적:store.MVNO실적},
    {name:'초고속', cur:store.초고속점수, max:maxScores.초고속, 실적:store.초고속실적},
    {name:'IPTV', cur:store.IPTV점수, max:maxScores.IPTV, 실적:store.IPTV실적}
  ].sort((a,b)=>(b.max-b.cur)-(a.max-a.cur));

  const teamGap = 50 - store.팀활동소계;
  const needScore = nextTarget ? (nextTarget.점수합 - myScore + 0.5) : 0;

  let targetComment = '';
  if (myRank <= 5) targetComment = `<div class="highlight">✅ 현재 <strong>전체 ${myRank}위</strong>로 상위권입니다! TOP 3 진입을 목표로 하세요.</div>`;
  else if (myRank <= 10) targetComment = `<div class="highlight">📈 현재 <strong>전체 ${myRank}위</strong>입니다. TOP 5 진입까지 <strong>${(top5.점수합-myScore).toFixed(1)}점</strong>이 필요합니다.</div>`;
  else if (myRank <= 20) targetComment = `<div class="highlight">📊 현재 <strong>전체 ${myRank}위</strong>입니다. TOP 10 진입까지 <strong>${(top10.점수합-myScore).toFixed(1)}점</strong>이 필요합니다.</div>`;
  else targetComment = `<div class="highlight">🎯 현재 <strong>전체 ${myRank}위</strong>입니다. TOP 20 진입까지 <strong>${(top20.점수합-myScore).toFixed(1)}점</strong>이 필요합니다.</div>`;

  let weakItems = gaps.slice(0,3).map(g => {
    const diff = g.max - g.cur;
    if (diff <= 0) return '';
    const addNeeded = g.name==='MNP'||g.name==='MVNO' ? Math.ceil(diff/2) : diff;
    const unit = g.name==='MNP'||g.name==='MVNO' ? '건(×2점)' : '건(×1점)';
    return `<li><strong>${g.name}</strong>: 현재 ${g.실적}건(${g.cur}점) → 최고 ${g.max}점 대비 <strong style="color:#e8002d">${diff}점 부족</strong>. 약 ${addNeeded}건 추가 모집 시 점수 향상 가능</li>`;
  }).filter(Boolean).join('');

  let teamComment = '';
  if (teamGap > 0) {
    teamComment = `<div class="highlight" style="background:#fff3cd;">⚠️ 팀활동 점수가 <strong>${store.팀활동소계}점</strong>으로, 만점(50점) 대비 <strong style="color:#e8002d">${teamGap}점 부족</strong>합니다.<br>
    ${store.팀활동20===0?'• S26 AI 컨테스트 참여(20점) 미완료<br>':''}
    ${store.팀활동30===0?'• 유심교체 도움/VMD 부착(30점) 미완료':''}
    </div>`;
  } else {
    teamComment = `<div class="highlight" style="background:#dcfce7;">✅ 팀활동 점수 만점(50점) 달성!</div>`;
  }

  const content = `
    <p><strong>📍 분석 대상:</strong> ${storeName} (현재 전체 ${myRank}위 / 점수합 ${myScore}점)</p>
    ${targetComment}
    <p><strong>🔍 실적 항목별 개선 포인트:</strong></p>
    <ul style="padding-left:18px;line-height:2;">${weakItems||'<li>모든 항목이 우수합니다!</li>'}</ul>
    <p><strong>🏃 팀활동 현황:</strong></p>
    ${teamComment}
    <p><strong>💡 종합 전략:</strong></p>
    <div class="highlight">
      ${gaps[0].max-gaps[0].cur>0?`① <strong>${gaps[0].name}</strong> 실적을 집중 강화하면 가장 빠른 점수 상승 효과를 기대할 수 있습니다.<br>`:''}
      ${teamGap>0?`② 팀활동 미완료 항목(${teamGap}점)을 즉시 완료하면 빠른 순위 상승이 가능합니다.<br>`:''}
      ③ 현재 점수합 ${myScore}점에서 <strong>약 ${Math.max(5, Math.ceil(needScore))}점 이상</strong> 추가 달성 시 순위 상승이 예상됩니다.
    </div>
  `;

  document.getElementById('aiModalContent').innerHTML = content;
  document.getElementById('aiModal').classList.add('open');
}

function closeModal() {
  document.getElementById('aiModal').classList.remove('open');
}
document.getElementById('aiModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ===================== 날짜 표시 =====================
function setDate() {
  const d = RAW_DATA[0].날짜;
  const dt = new Date(d);
  const y = dt.getFullYear(), m = dt.getMonth()+1, day = dt.getDate();
  document.getElementById('dashDate').textContent = `📅 데이터 기준일: ${y}년 ${m}월 ${day}일`;
}

// ===================== 초기화 =====================
function init() {
  setDate();
  buildCrownCards();
  buildTabs();
}
init();
</script>
